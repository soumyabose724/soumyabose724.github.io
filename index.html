<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FlowTask"/>
<title>FlowTask</title>
<link rel="manifest" id="manifest-placeholder"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#0a0a0f;}
  body{font-family:'DM Sans','Segoe UI',sans-serif;color:#e2e8f0;overscroll-behavior:none;}
  input,select,textarea,button{font-family:inherit;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:#0a0a0f;}
  ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:#334155;}
  input[type=date]::-webkit-calendar-picker-indicator,
  input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:0.4;}

  /* ── MOBILE (default) ─────────────────────────────────────── */
  html,body{overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;overflow:hidden;}
  #header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 10px;background:#0a0a0f;border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:50;flex-shrink:0;}
  #header .logo{font-size:18px;font-weight:800;color:#60a5fa;letter-spacing:-0.5px;}
  #header .hright{display:flex;gap:8px;align-items:center;}
  #header .hdate{font-size:11px;color:#475569;}
  .sett-btn{background:none;border:1px solid #1e293b;border-radius:7px;color:#64748b;font-size:14px;padding:4px 8px;cursor:pointer;}
  #content{flex:1;overflow-y:auto;padding-bottom:80px;-webkit-overflow-scrolling:touch;}
  #nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:#0d1117;border-top:1px solid #1e293b;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
  .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 2px;background:none;border:none;cursor:pointer;color:#475569;transition:color .15s;}
  .nav-btn.active{color:#60a5fa;}
  .nav-ico{font-size:18px;line-height:1;}
  .nav-lbl{font-size:9px;margin-top:2px;font-weight:500;}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
  .modal{background:#0d1117;border:1px solid #1e293b;border-radius:18px 18px 0 0;width:100%;max-width:430px;padding:18px;max-height:92vh;overflow-y:auto;}

  /* ── TABLET 640px+ ────────────────────────────────────────── */
  @media(min-width:640px){
    html,body{overflow:hidden;}
    #app{max-width:600px;}
    .modal{max-width:560px;border-radius:18px 18px 0 0;}
    .view{padding:18px 20px 0;}
    .kpi-val{font-size:22px;}
    .mat-grid{grid-template-columns:1fr 1fr;}
  }

  /* ── DESKTOP 900px+ ───────────────────────────────────────── */
  @media(min-width:900px){
    html,body{overflow:auto;height:100%;}
    #app{
      max-width:1280px;
      width:100%;
      height:100vh;
      margin:0 auto;
      display:grid;
      grid-template-columns:220px 1fr;
      grid-template-rows:auto 1fr;
      grid-template-areas:
        "sidebar header"
        "sidebar content";
      overflow:hidden;
      border-left:1px solid #1e293b;
      border-right:1px solid #1e293b;
    }
    #header{
      grid-area:header;
      padding:14px 24px 12px;
      border-left:1px solid #1e293b;
    }
    #header .logo{font-size:0;}
    #content{
      grid-area:content;
      padding-bottom:24px;
      border-left:1px solid #1e293b;
      overflow-y:auto;
    }
    /* Sidebar nav */
    #nav{
      grid-area:sidebar;
      position:static;
      flex-direction:column;
      justify-content:flex-start;
      align-items:stretch;
      padding:0 0 24px;
      border-top:none;
      border-right:1px solid #1e293b;
      background:#0d1117;
      height:100%;
      overflow-y:auto;
    }
    #nav::before{
      content:"⬡ FlowTask";
      display:block;
      font-size:17px;
      font-weight:800;
      color:#60a5fa;
      letter-spacing:-0.5px;
      padding:20px 20px 16px;
      border-bottom:1px solid #1e293b;
      margin-bottom:8px;
    }
    .nav-btn{
      flex:none;
      flex-direction:row;
      justify-content:flex-start;
      align-items:center;
      padding:11px 20px;
      gap:11px;
      border-radius:0;
      border-left:3px solid transparent;
      transition:background .15s, border-color .15s, color .15s;
    }
    .nav-btn:hover{background:#111827;color:#94a3b8;}
    .nav-btn.active{
      background:#1e3a5f22;
      color:#60a5fa;
      border-left-color:#60a5fa;
    }
    .nav-ico{font-size:18px;}
    .nav-lbl{font-size:13px;font-weight:600;margin-top:0;}
    /* Modals — centered dialog on desktop */
    .overlay{align-items:center;}
    .modal{
      border-radius:16px;
      max-width:560px;
      max-height:88vh;
    }
    /* Content layout */
    .view{padding:24px 28px 0;}
    .kpi-val{font-size:24px;}
    .kpi-card{padding:14px 10px;}
    .d-sec{padding:16px 18px;}
    .mat-grid{grid-template-columns:1fr 1fr;gap:12px;}
    /* Kanban — 2 columns on desktop */
    #kb-board{
      display:grid !important;
      grid-template-columns:1fr 1fr;
      gap:12px;
      padding-bottom:24px !important;
    }
    #kb-board .cancel-zone{grid-column:1/-1;}
    /* Timeline max-height increase */
    .tl-max{max-height:calc(100vh - 220px) !important;}
    /* Toast position */
    .toast{bottom:24px;}
    /* Card hover */
    .card:hover{border-color:#334155;background:#161e2e;}
    .kb-card:hover{background:#111827;}
  }

  /* ── LARGE DESKTOP 1200px+ ────────────────────────────────── */
  @media(min-width:1200px){
    #app{grid-template-columns:240px 1fr;}
    .view{padding:28px 36px 0;}
    .kpi-row{gap:10px;}
    .kpi-card{padding:16px 12px;}
    .d-sec{padding:18px 20px;margin-bottom:16px;}
  }

  /* ── SHARED COMPONENT STYLES ──────────────────────────────── */
  .view{padding:14px 14px 0;}
  .view-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .view-title{font-size:19px;font-weight:800;color:#f1f5f9;}
  .badge{background:#1e293b;color:#60a5fa;border-radius:99px;padding:1px 7px;font-size:11px;font-weight:600;}
  .add-btn{background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;}
  .add-btn:hover{background:#1e40af;}
  .sm-btn{background:#1e293b;border:1px solid #334155;border-radius:7px;color:#94a3b8;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;transition:background .15s;}
  .sm-btn:hover{background:#273549;color:#e2e8f0;}
  .srch{width:100%;background:#111827;border:1px solid #1e293b;border-radius:8px;padding:9px 12px;color:#e2e8f0;font-size:13px;outline:none;margin-bottom:8px;transition:border-color .15s;}
  .srch:focus{border-color:#3b82f6;}
  .f-row{display:flex;gap:8px;margin-bottom:10px;}
  .fsel{flex:1;background:#111827;border:1px solid #1e293b;border-radius:8px;padding:7px 8px;color:#94a3b8;font-size:12px;outline:none;}
  .fsel:focus{border-color:#3b82f6;}
  .list{display:flex;flex-direction:column;gap:7px;}
  .card{display:flex;align-items:flex-start;background:#111827;border:1px solid #1e293b;border-radius:11px;padding:11px;gap:9px;transition:border-color .2s,background .2s;cursor:pointer;}
  .cbody{flex:1;min-width:0;}
  .cname{font-size:13px;font-weight:600;color:#f1f5f9;line-height:1.3;}
  .cmeta{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
  .pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .cat-p{background:#1e293b;color:#94a3b8;border-radius:5px;padding:2px 6px;font-size:10px;font-weight:500;}
  .pr-p{background:#0f172a;color:#64748b;border-radius:5px;padding:2px 6px;font-size:10px;}
  .s-pill{border-radius:5px;padding:2px 7px;font-size:10px;font-weight:600;}
  .rec-p{background:#1e3a5f;color:#60a5fa;border-radius:5px;padding:2px 6px;font-size:10px;}
  .f-p{background:#1a2e1a;color:#4ade80;border-radius:5px;padding:2px 6px;font-size:10px;}
  .u-p{background:#2d2006;color:#fbbf24;border-radius:5px;padding:2px 6px;font-size:10px;}
  .ovd-p{background:#450a0a;color:#f87171;border:1px solid #dc2626;border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700;}
  .t-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
  .tag{background:#0f172a;color:#7dd3fc;border:1px solid #1e3a5f;border-radius:5px;padding:1px 6px;font-size:10px;}
  .ico-btn{background:none;border:none;color:#475569;cursor:pointer;font-size:16px;padding:6px 8px;line-height:1;transition:color .15s;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
  .ico-btn:hover{color:#94a3b8;}
  .toggle{display:flex;gap:3px;background:#111827;border-radius:7px;padding:3px;}
  .tog-btn{background:none;border:none;color:#475569;padding:4px 9px;border-radius:5px;cursor:pointer;font-size:14px;transition:background .15s,color .15s;}
  .tog-on{background:#1e3a5f;color:#60a5fa;}
  .d-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;background:#111827;border-radius:9px;padding:7px 10px;}
  .d-nav-l{font-size:13px;font-weight:700;color:#e2e8f0;}
  .n-arr{background:none;border:none;color:#60a5fa;font-size:19px;cursor:pointer;padding:0 7px;}
  .kpi-row{display:flex;gap:6px;margin-bottom:14px;}
  .kpi-card{flex:1;background:#111827;border-radius:12px;padding:10px 8px;text-align:center;min-width:0;}
  .kpi-val{font-size:20px;font-weight:800;line-height:1;}
  .kpi-lbl{font-size:9px;color:#64748b;margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
  .kpi-sub{font-size:9px;color:#334155;margin-top:1px;}
  .d-sec{background:#111827;border-radius:11px;padding:12px 13px;margin-bottom:12px;border:1px solid #1e293b;}
  .d-st{font-size:12px;font-weight:700;color:#94a3b8;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.05em;}
  .pb{width:100%;height:6px;background:#1e293b;border-radius:3px;overflow:hidden;}
  .pf{height:100%;background:#3b82f6;border-radius:3px;transition:width .4s ease;}
  .up-day{min-width:62px;background:#111827;border:1px solid #1e293b;border-radius:9px;padding:8px 6px;text-align:center;flex-shrink:0;}
  .mat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .mat-cell{border-radius:10px;padding:10px;min-height:120px;}
  .mat-task{background:#0a0a0f;border-radius:5px;padding:6px 7px;margin-bottom:5px;cursor:pointer;transition:background .15s;}
  .mat-task:hover{background:#111827;}
  .m-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .m-title{font-size:16px;font-weight:800;color:#f1f5f9;}
  .close-btn{background:#1e293b;border:none;color:#94a3b8;width:27px;height:27px;border-radius:7px;cursor:pointer;font-size:12px;flex-shrink:0;transition:background .15s;}
  .close-btn:hover{background:#334155;}
  .lbl{display:block;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;margin-top:13px;}
  .inp{width:100%;background:#111827;border:1px solid #1e293b;border-radius:7px;padding:9px 11px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .15s;}
  .inp:focus{border-color:#3b82f6;}
  .ta{width:100%;background:#111827;border:1px solid #1e293b;border-radius:7px;padding:9px 11px;color:#e2e8f0;font-size:12px;outline:none;resize:vertical;line-height:1.5;transition:border-color .15s;}
  .ta:focus{border-color:#3b82f6;}
  .opt-row{display:flex;flex-wrap:wrap;gap:5px;}
  .opt-btn{background:#111827;border:1px solid #1e293b;border-radius:7px;color:#64748b;padding:6px 11px;font-size:11px;cursor:pointer;font-weight:500;transition:background .15s,border-color .15s,color .15s;}
  .opt-btn:hover{background:#1e293b;color:#94a3b8;}
  .opt-on{background:#1e3a5f;border:1px solid #3b82f6;color:#60a5fa;}
  .tag-box{display:flex;flex-wrap:wrap;gap:4px;background:#111827;border:1px solid #1e293b;border-radius:7px;padding:7px 9px;align-items:center;min-height:38px;}
  .tag-inp{background:none;border:none;color:#e2e8f0;font-size:12px;outline:none;min-width:70px;flex:1;}
  .sugg{background:#111827;border:1px solid #1e293b;border-radius:7px;margin-top:2px;overflow:hidden;max-height:140px;overflow-y:auto;}
  .sugg-i{padding:7px 11px;cursor:pointer;color:#7dd3fc;font-size:12px;}
  .sugg-i:hover{background:#1e293b;}
  .m-act{display:flex;gap:9px;margin-top:14px;}
  .c-btn{flex:1;background:#1e293b;border:none;border-radius:9px;color:#94a3b8;padding:11px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
  .c-btn:hover{background:#273549;}
  .o-btn{flex:1;background:#1d4ed8;border:none;border-radius:9px;color:#fff;padding:11px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;}
  .o-btn:hover{background:#1e40af;}
  .s-mnu{background:#111827;border:1px solid #1e293b;border-radius:9px;margin-top:5px;overflow:hidden;}
  .s-mi{display:block;width:100%;background:none;border:none;padding:10px 13px;text-align:left;cursor:pointer;font-size:12px;font-weight:600;transition:background .15s;}
  .s-mi:hover{background:#1e293b;}
  .toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);border-radius:9px;padding:9px 18px;color:#fff;font-size:12px;font-weight:600;z-index:300;white-space:nowrap;pointer-events:none;}
  .sett-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e293b;margin-bottom:6px;}
  .slbl{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-top:16px;margin-bottom:8px;border-bottom:1px solid #1e293b;padding-bottom:4px;}
  .dr{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #0f172a;}
  .dr-l{font-size:12px;color:#475569;font-weight:600;flex-shrink:0;margin-right:12px;}
  .mrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #0f172a;cursor:pointer;transition:background .15s;}
  .mrow:hover{background:#161e2e;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-hdr{text-align:center;font-size:10px;color:#475569;font-weight:600;padding:3px 0;}
  .cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:5px;cursor:pointer;background:#111827;transition:background .15s;}
  .cal-cell:hover{background:#1e293b;}
  .cal-sel{background:#1e3a5f;border:1px solid #3b82f6;}
  .cal-today{border:2px solid #60a5fa;}
  .tl-row{display:flex;min-height:44px;border-bottom:1px solid #0f172a;}
  .tl-hr{width:42px;color:#334155;font-size:10px;padding:5px 4px 0 0;text-align:right;flex-shrink:0;}
  .tl-c{flex:1;padding:3px 0 3px 7px;display:flex;flex-direction:column;gap:3px;}
  .empty-state{text-align:center;padding:60px 20px;}
  .empty-ico{font-size:44px;margin-bottom:14px;display:block;}
  .empty-txt{color:#475569;font-size:15px;font-weight:600;margin-bottom:6px;}
  .empty-sub{color:#334155;font-size:12px;line-height:1.6;}
  .pill-tabs{display:flex;gap:4px;background:#111827;border-radius:8px;padding:3px;margin-bottom:12px;}
  .pill-tab{flex:1;background:none;border:none;color:#475569;padding:7px 4px;border-radius:6px;cursor:pointer;font-size:10px;font-weight:600;transition:background .15s,color .15s;}
  .pill-tab.active{background:#1e3a5f;color:#60a5fa;}
  .kb-col{background:#111827;border:1px solid #1e293b;border-radius:10px;overflow:hidden;transition:all .15s;margin-bottom:10px;}
  .kb-col-hdr{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:#0d1117;border-bottom:2px solid;}
  .kb-col-body{padding:8px;display:flex;flex-direction:column;gap:6px;}
  .kb-card{background:#0a0a0f;border-radius:8px;padding:9px 10px;cursor:grab;border-left:3px solid;transition:opacity .15s,background .15s;}
  .cancel-zone{border:1px dashed #dc262655;border-radius:10px;padding:12px;text-align:center;color:#7f1d1d;font-size:12px;}
  input[type=checkbox]{accent-color:#3b82f6;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .ins-how{background:#111827;border:1px solid #1e293b;border-radius:9px;padding:12px;margin-top:8px;font-size:11px;color:#94a3b8;line-height:1.7;}
  .ins-how b{color:#60a5fa;}

  /* ── CSS CUSTOM PROPERTIES (theme tokens) ───────────────────── */
  :root{
    --bg:       #0a0a0f;
    --surface:  #111827;
    --surface2: #0d1117;
    --surface3: #0a0a0f;
    --border:   #1e293b;
    --border2:  #0f172a;
    --text1:    #f1f5f9;
    --text2:    #94a3b8;
    --text3:    #475569;
    --text4:    #334155;
    --accent:   #60a5fa;
    --accent-bg:#1e3a5f;
  }
  body.light{
    --bg:       #f8fafc;
    --surface:  #ffffff;
    --surface2: #f1f5f9;
    --surface3: #e2e8f0;
    --border:   #e2e8f0;
    --border2:  #cbd5e1;
    --text1:    #0f172a;
    --text2:    #334155;
    --text3:    #64748b;
    --text4:    #94a3b8;
    --accent:   #2563eb;
    --accent-bg:#dbeafe;
  }

  /* ── LIGHT THEME — structural overrides ─────────────────────── */
  body.light{background:var(--bg);color:var(--text1);}
  body.light #app{background:var(--bg);}
  body.light #header{background:var(--surface)!important;border-color:var(--border)!important;}
  body.light #nav{background:var(--surface)!important;border-color:var(--border)!important;}
  body.light .nav-btn{color:var(--text3)!important;}
  body.light .nav-btn.active{color:var(--accent)!important;}
  body.light .nav-ico{color:inherit;}
  body.light .view{background:var(--bg)!important;}
  body.light .view-title{color:var(--text1)!important;}
  /* Cards and surfaces */
  body.light .card,body.light .kb-card,body.light .kpi-card,body.light .d-sec,
  body.light .up-day,body.light .mrow{
    background:var(--surface)!important;
    border-color:var(--border)!important;
    color:var(--text1)!important;
  }
  body.light .cname{color:var(--text1)!important;}
  body.light .kpi-val{color:inherit!important;}
  body.light .kpi-lbl{color:var(--text3)!important;}
  body.light .kpi-sub{color:var(--text3)!important;}
  /* Inputs */
  body.light .inp,body.light .ta,body.light .srch,body.light .fsel,body.light .tag-box,body.light .tag-inp{
    background:var(--surface2)!important;
    border-color:var(--border)!important;
    color:var(--text1)!important;
  }
  /* Buttons */
  body.light .opt-btn{background:var(--surface2)!important;border-color:var(--border)!important;color:var(--text2)!important;}
  body.light .opt-on{background:var(--accent-bg)!important;border-color:var(--accent)!important;color:var(--accent)!important;}
  body.light .sm-btn{background:var(--surface2)!important;border-color:var(--border)!important;color:var(--text2)!important;}
  body.light .c-btn{background:var(--surface2)!important;color:var(--text2)!important;}
  body.light .ico-btn{color:var(--text2)!important;}
  /* Modal */
  body.light .overlay{background:rgba(0,0,0,0.5)!important;}
  body.light .modal{background:var(--surface)!important;border-color:var(--border)!important;}
  body.light .m-title{color:var(--text1)!important;}
  body.light .lbl{color:var(--text2)!important;}
  body.light .dr-l{color:var(--text3)!important;}
  /* Navigation sections */
  body.light .d-nav{background:var(--surface2)!important;}
  body.light .d-nav-l{color:var(--text1)!important;}

<script>
// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const PRIORITIES  = ["Low","Medium","High","Critical"];
const CATEGORIES  = ["Work","Personal","Learning"];
const STATUSES    = ["Not Started","In Progress","On Hold","Completed","Cancelled"];
const FREQUENCIES = ["Daily","Weekly","Monthly","Specific Weekdays"];
const WEEKDAYS    = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
// Base preset suggestions — user-added tags are merged in at runtime
const TAG_SUGG_BASE = ["urgent","deep-work","meeting","review","research","admin","creative","health","finance","family","side-project","reading","exercise","networking"];
let TAG_SUGG = [...TAG_SUGG_BASE]; // mutable; extended with user-added tags

// Collect all unique tags ever used across backlog + scheduled, merge with base presets
function refreshTagSugg(){
  const used=new Set(TAG_SUGG_BASE);
  STATE.backlog.forEach(t=>(t.tags||[]).forEach(g=>used.add(g)));
  STATE.scheduled.forEach(t=>(t.tags||[]).forEach(g=>used.add(g)));
  TAG_SUGG=[...used].sort((a,b)=>a.localeCompare(b));
}
const SC = {
  "Not Started":{bg:"#1e293b",text:"#94a3b8",border:"#334155"},
  "In Progress":{bg:"#1e3a5f",text:"#60a5fa",border:"#2563eb"},
  "On Hold":    {bg:"#2d2006",text:"#fbbf24",border:"#d97706"},
  "Completed":  {bg:"#0d2818",text:"#34d399",border:"#059669"},
  "Cancelled":  {bg:"#2d0f0f",text:"#f87171",border:"#dc2626"},
};
const PC = {Low:"#64748b",Medium:"#3b82f6",High:"#f59e0b",Critical:"#ef4444"};
const gid = () => Math.random().toString(36).substr(2,9);

// ─── DATE UTILS ───────────────────────────────────────────────────────────────
const p2 = n => String(n).padStart(2,"0");
const localToday = () => { const d=new Date(); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; };
const localStr = (y,m,d) => `${y}-${p2(m+1)}-${p2(d)}`;
const addDays = (ds,n) => { const d=new Date(ds+"T00:00:00"); d.setDate(d.getDate()+n); return localStr(d.getFullYear(),d.getMonth(),d.getDate()); };
const nowTime = () => { const d=new Date(); return `${p2(d.getHours())}:${p2(d.getMinutes())}`; };
const fmtDate = ds => { if(!ds)return""; const d=new Date(ds+"T00:00:00"); return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}); };
const fmtShort = ds => { if(!ds)return""; const d=new Date(ds+"T00:00:00"); return d.toLocaleDateString("en-US",{month:"short",day:"numeric"}); };
const monthDates = (year,month) => {
  const first=new Date(year,month,1), last=new Date(year,month+1,0), dates=[];
  for(let i=0;i<first.getDay();i++) dates.push(null);
  for(let d=1;d<=last.getDate();d++) dates.push(localStr(year,month,d));
  return dates;
};
const dayLabel = ds => {
  if(!ds)return"";
  const d=new Date(ds+"T00:00:00");
  const td=localToday(), yd=addDays(td,-1), tm=addDays(td,1);
  if(ds===td)return"Today"; if(ds===yd)return"Yesterday"; if(ds===tm)return"Tomorrow";
  return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
};

// ─── TASK EXPANSION ───────────────────────────────────────────────────────────
function expandRecurring(task) {
  const inst=[], start=task.startDate, cutoff=task.recurringEndDate||addDays(start,364);
  const sdow=new Date(start+"T00:00:00").getDay(), sday=new Date(start+"T00:00:00").getDate();
  let cur=start;
  while(cur<=cutoff){
    const d=new Date(cur+"T00:00:00"), dow=d.getDay(); let ok=false;
    if(task.frequency==="Daily") ok=true;
    else if(task.frequency==="Weekly") ok=(dow===sdow);
    else if(task.frequency==="Monthly") ok=(d.getDate()===sday);
    else if(task.frequency==="Specific Weekdays") ok=Array.isArray(task.specificDays)&&task.specificDays.includes(WEEKDAYS[dow]);
    if(ok) inst.push({...task, scheduledId:`${task.masterScheduledId}_${cur}`, instanceDate:cur});
    cur=addDays(cur,1);
  }
  return inst;
}
function buildAll(scheduled){
  const r=[];
  for(const t of scheduled){ if(t.taskType==="recurring") r.push(...expandRecurring(t)); else r.push(t); }
  return r;
}
function applyOverrides(inst){
  return inst.map(t=>{
    if(t.taskType==="recurring"&&t.instanceDate){
      const ov=(t.instanceOverrides||{})[t.instanceDate];
      if(ov) return{...t,status:ov.status,cancelReason:ov.reason,statusHistory:ov.history};
    }
    return t;
  });
}
const isOverdue = t => {
  if(["Completed","Cancelled"].includes(t.status)) return false;
  const td=localToday();
  if(t.taskType==="single") return !!(t.dueDate&&t.dueDate<td);
  if(t.taskType==="recurring") return !!(t.instanceDate&&t.instanceDate<td);
  return false;
};
// taskDate returns the date a task instance "lives on" for display/filtering purposes.
// For recurring: instanceDate. For single: startDate first, then dueDate fallback.
const taskDate = t => t.taskType==="recurring"?t.instanceDate:(t.startDate||t.dueDate||"");
const getMasterId = t => t.masterScheduledId || t.scheduledId;
// Returns a colour for a category — built-ins have fixed colours, custom ones get a hash colour
const CAT_COLORS={Work:"#60a5fa",Personal:"#34d399",Learning:"#f59e0b"};
function catColor(c){ return CAT_COLORS[c]||(()=>{let h=0;for(const ch of(c||""))h=(h*31+ch.charCodeAt(0))>>>0;return`hsl(${h%360},55%,60%)`;})(); }

// ─── TASK DURATION HELPERS ────────────────────────────────────────────────────
// Returns [startMins, endMins] for a task, or null if times missing/invalid.
function taskMinuteSpan(t){
  if(!t.startTime||!t.endTime) return null;
  const [sh,sm]=t.startTime.split(":").map(Number);
  const [eh,em]=t.endTime.split(":").map(Number);
  const s=sh*60+sm, e=eh*60+em;
  return e>s?[s,e]:null;
}
// Raw (non-merged) hours for a single task — used for individual task display only.
function taskHours(t){
  const span=taskMinuteSpan(t);
  return span?(span[1]-span[0])/60:null;
}
// Merge overlapping [start,end] minute intervals and return total minutes covered.
function mergeIntervals(intervals){
  if(!intervals.length) return 0;
  const sorted=[...intervals].sort((a,b)=>a[0]-b[0]);
  let total=0, cur=sorted[0];
  for(let i=1;i<sorted.length;i++){
    const next=sorted[i];
    if(next[0]<cur[1]){ cur=[cur[0],Math.max(cur[1],next[1])]; }
    else{ total+=cur[1]-cur[0]; cur=next; }
  }
  total+=cur[1]-cur[0];
  return total;
}
// Overlap-safe total hours for a list of tasks filtered to a category.
// Pass category="All" to sum all categories.
function mergedCategoryHours(tasks, category){
  const spans=tasks
    .filter(t=>category==="All"||t.category===category)
    .map(taskMinuteSpan)
    .filter(Boolean);
  return mergeIntervals(spans)/60;
}
// Format decimal hours to "Xh Ym"
function fmtHours(h){
  if(h===null||h===0) return null;
  const hrs=Math.floor(h), mins=Math.round((h-hrs)*60);
  if(hrs===0) return `${mins}m`;
  if(mins===0) return `${hrs}h`;
  return `${hrs}h ${mins}m`;
}

// ─── INDEXEDDB ────────────────────────────────────────────────────────────────
const DB_NAME = "flowtask_db";
const DB_VER  = 2;
let db = null;

function openDB() {
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if(!d.objectStoreNames.contains("backlog"))   d.createObjectStore("backlog",{keyPath:"id"});
      if(!d.objectStoreNames.contains("scheduled")) d.createObjectStore("scheduled",{keyPath:"scheduledId"});
      if(!d.objectStoreNames.contains("settings"))  d.createObjectStore("settings",{keyPath:"key"});
      if(!d.objectStoreNames.contains("templates")) d.createObjectStore("templates",{keyPath:"id"});
    };
    req.onsuccess = e => { db=e.target.result; res(db); };
    req.onerror   = e => rej(e.target.error);
  });
}

// Generic key-value settings store
function dbGetSetting(key,def=null){
  return new Promise(res=>{
    try{
      const tx=db.transaction("settings","readonly");
      const req=tx.objectStore("settings").get(key);
      req.onsuccess=()=>res(req.result?req.result.value:def);
      req.onerror=()=>res(def);
    }catch{res(def);}
  });
}
function dbSetSetting(key,value){
  return new Promise((res,rej)=>{
    try{
      const tx=db.transaction("settings","readwrite");
      const req=tx.objectStore("settings").put({key,value});
      req.onsuccess=()=>res();
      req.onerror=e=>rej(e.target.error);
    }catch(e){rej(e);}
  });
}
function dbGetAllSettings(){
  return dbGetAll("settings");
}

// Templates
async function dbGetTemplates(){ return dbGetAll("templates"); }
async function dbSaveTemplate(tmpl){ return dbPut("templates",tmpl); }
async function dbDeleteTemplate(id){ return dbDelete("templates",id); }
function dbGetAll(store) {
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,"readonly");
    const req=tx.objectStore(store).getAll();
    req.onsuccess=()=>res(req.result||[]);
    req.onerror=e=>rej(e.target.error);
  });
}
function dbPut(store,obj) {
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,"readwrite");
    const req=tx.objectStore(store).put(obj);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e.target.error);
  });
}
function dbDelete(store,key) {
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,"readwrite");
    const req=tx.objectStore(store).delete(key);
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e.target.error);
  });
}
function dbClear(store) {
  return new Promise((res,rej)=>{
    const tx=db.transaction(store,"readwrite");
    const req=tx.objectStore(store).clear();
    req.onsuccess=()=>res();
    req.onerror=e=>rej(e.target.error);
  });
}
async function dbSaveBacklog(arr) {
  await dbClear("backlog");
  for(const t of arr) await dbPut("backlog",t);
}
async function dbSaveScheduled(arr) {
  await dbClear("scheduled");
  for(const t of arr) await dbPut("scheduled",t);
}

}
async function saveBacklog()   { await dbSaveBacklog(STATE.backlog); refreshTagSugg(); }
async function saveScheduled() { invalidateCache(); await dbSaveScheduled(STATE.scheduled); refreshTagSugg(); }
async function saveSetting(key,value){ STATE[key]=value; await dbSetSetting(key,value); }

function applyTheme(t){
  document.body.classList.toggle("light",t==="light");
  document.body.classList.toggle("dark",t!=="light");
  document.documentElement.setAttribute("data-theme",t);
  document.querySelector('meta[name="theme-color"]')?.setAttribute("content",t==="light"?"#ffffff":"#0a0a0f");

  // Inject/remove a dynamic override sheet for light mode
  // This is necessary because inline style="" attributes can't be overridden by class CSS
  // unless we use attribute selectors with !important
  let sheet=document.getElementById("theme-overrides");
  if(t==="light"){
    if(!sheet){
      sheet=document.createElement("style");
      sheet.id="theme-overrides";
      document.head.appendChild(sheet);
    }
    sheet.textContent=`
      body.light #content,body.light #content *{color:inherit;}

      body.light #content [style*="background:#1e3a5f"]{background:#dbeafe!important;}
      body.light #content [style*="background:#0a1628"]{background:#eff6ff!important;}
      body.light #content [style*="background:#060d1a"]{background:#eff6ff!important;}
      body.light #content [style*="background:#1c0a0a"]{background:#fff5f5!important;}
      body.light #content [style*="background:#2d0f0f"]{background:#fff5f5!important;}
      body.light #content [style*="background:#2d2006"]{background:#fffbeb!important;}
      body.light #content [style*="background:#0d2818"]{background:#f0fdf4!important;}
      body.light #content [style*="color:#94a3b8"]{color:#475569!important;}
      body.light #content [style*="color:#475569"]{color:#334155!important;}
      body.light #content [style*="color:#334155"]{color:#64748b!important;}
      body.light #content [style*="color:#e2e8f0"]{color:#0f172a!important;}
      body.light #content [style*="color:#f1f5f9"]{color:#1e293b!important;}
      body.light #content [style*="color:#64748b"]{color:#475569!important;}

async function aiExtractTasks(text){
  try{
    const apiKey=DASH_AI.apiKey||"";
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true",
        ...(apiKey?{"x-api-key":apiKey}:{})
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-5",
        max_tokens:1000,
        messages:[{role:"user",content:`Extract actionable tasks from these notes. Return ONLY a JSON array, no markdown, no preamble. Each item: {"name":"...","priority":"Low|Medium|High|Critical","category":"Work|Personal|Learning"}. If nothing actionable, return []. Notes:\n\n${text}`}]
      })
    });
    if(!res.ok) return fallbackExtract(text);
    const data=await res.json();
    const raw=(data.content||[]).map(b=>b.text||"").join("").trim();
    const clean=raw.replace(/```json|```/g,"").trim();
    const parsed=JSON.parse(clean);
    return Array.isArray(parsed)?parsed.map(t=>({id:gid(),name:t.name,priority:t.priority||"Medium",category:t.category||"Work"})):[];
  }catch{ return fallbackExtract(text); }
}
function fallbackExtract(text){
  const pats=[/^[-*•]\s+(.+)/,/^TODO[:\s]+(.+)/i,/^TASK[:\s]+(.+)/i,/^ACTION[:\s]+(.+)/i,
    /^(?:need to|must|should|have to|remember to|don't forget to)\s+(.+)/i,/^\d+\.\s+(.+)/,
    /^(?:follow up|followup)[:\s]*(.+)?/i,
    /^(?:schedule|book|call|email|send|write|create|review|update|fix|check|prepare|discuss|meet)\s+.+/i];
  const tasks=[];
  text.split("\n").map(l=>l.trim()).filter(Boolean).forEach(line=>{
    for(const p of pats){const m=line.match(p);if(m){const n=(m[1]||m[0]).trim();if(n.length>3)tasks.push({id:gid(),name:n,priority:"Medium",category:"Work"});break;}}
  });
  return tasks;
}

async function requestNotifPermission(){
  if(!("Notification" in window)) return "unavailable";
  if(Notification.permission==="granted"){ STATE.notifOk=true; return "granted"; }
  if(Notification.permission==="denied") return "denied";
  // Must be called in direct response to a user gesture
  try{
    const result=await Notification.requestPermission();
    if(result==="granted") STATE.notifOk=true;
    return result;
  }catch{
    // Older callback-based API fallback
    return new Promise(res=>{
      try{
        Notification.requestPermission(r=>{ if(r==="granted") STATE.notifOk=true; res(r); });
      }catch{ res("unavailable"); }
    });
  }
}

function scheduleNotification(task, minutesBefore=15){
  if(!("Notification" in window)||Notification.permission!=="granted") return;
  const date=taskDate(task), time=task.startTime||"09:00";
  if(!date) return;
  const fireAt=new Date(`${date}T${time}`).getTime()-minutesBefore*60000;
  const delay=fireAt-Date.now();
  // Only schedule if within 24 hours and in the future
  if(delay<=0||delay>86400000) return;
  const timerId=setTimeout(()=>{
    try{
      new Notification("⏰ FlowTask",{
        body:`"${task.name}" starts in ${minutesBefore} min`,
        tag:task.scheduledId,
        icon:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a0f'/%3E%3Ctext x='32' y='46' font-size='36' text-anchor='middle' fill='%2360a5fa'%3E⬡%3C/text%3E%3C/svg%3E"
      });
    }catch{}
  },delay);
  // Store timer id on window so it can be cleared if needed
  window._notifTimers=window._notifTimers||{};
  window._notifTimers[task.scheduledId]=timerId;
}

// ─── PRODUCTIVITY METRICS ─────────────────────────────────────────────────────
function computeProductivityMetrics(allInst){
  const td=localToday();

  // Weekly velocity: tasks completed per week over last 4 weeks
  const weeklyVelocity=Array.from({length:4},(_,wi)=>{
    const wStart=addDays(td,-(wi+1)*7), wEnd=addDays(td,-wi*7);
    const n=allInst.filter(t=>{
      if(t.status!=="Completed") return false;
      const h=(t.statusHistory||[]).filter(h=>h.status==="Completed");
      const completedAt=h.length?h[h.length-1].at.split("T")[0]:taskDate(t);
      return completedAt>=wStart&&completedAt<wEnd;
    }).length;
    return{label:`W-${wi+1}`,n};
  }).reverse();

  // Average completion time in days (createdAt → completed)
  const completedWithAge=allInst.filter(t=>t.status==="Completed"&&t.scheduledAt);
  let avgAgeDays=null;
  if(completedWithAge.length>0){
    const ages=completedWithAge.map(t=>{
      const h=(t.statusHistory||[]).filter(h=>h.status==="Completed");
      const completedAt=h.length?new Date(h[h.length-1].at):new Date(taskDate(t)+"T00:00:00");
      const created=new Date(t.scheduledAt);
      return Math.max(0,(completedAt-created)/(1000*60*60*24));
    });
    avgAgeDays=(ages.reduce((a,b)=>a+b,0)/ages.length).toFixed(1);
  }

  // Peak productivity hour: which hour of day most completions happen
  const hourCounts=Array(24).fill(0);
  allInst.filter(t=>t.status==="Completed").forEach(t=>{
    const h=(t.statusHistory||[]).filter(h=>h.status==="Completed");
    if(h.length){const hr=new Date(h[h.length-1].at).getHours();hourCounts[hr]++;}
  });
  const peakHour=hourCounts.indexOf(Math.max(...hourCounts));
  const peakHourLabel=hourCounts[peakHour]>0?`${p2(peakHour)}:00–${p2(peakHour+1)}:00`:null;

  // Priority adherence: % of Critical+High completed vs total
  const highPrio=allInst.filter(t=>["Critical","High"].includes(t.priority));
  const highDone=highPrio.filter(t=>t.status==="Completed").length;
  const prioAdherence=highPrio.length>0?Math.round((highDone/highPrio.length)*100):null;

  // Overdue rate: % of tasks that went overdue at some point (currently overdue / total active)
  const totalActive=allInst.filter(t=>!["Completed","Cancelled"].includes(t.status)).length;
  const overdueNow=allInst.filter(t=>isOverdue(t)).length;
  const overdueRate=totalActive>0?Math.round((overdueNow/totalActive)*100):0;

  // On-hold tasks (procrastination indicator)
  const onHold=allInst.filter(t=>t.status==="On Hold").length;

  // 7-day completion trend (completions per day last 7 days)
  const trend7=Array.from({length:7},(_,i)=>{
    const date=addDays(td,-6+i);
    const n=allInst.filter(t=>{
      if(t.status!=="Completed") return false;
      const h=(t.statusHistory||[]).filter(h=>h.status==="Completed");
      const cat=h.length?h[h.length-1].at.split("T")[0]:taskDate(t);
      return cat===date;
    }).length;
    return{date,n,label:new Date(date+"T00:00:00").toLocaleDateString("en-US",{weekday:"short"})};
  });

  // Work hours today — overlap-safe, all statuses except Cancelled
  const todayTasks=allInst.filter(t=>taskDate(t)===td&&t.status!=="Cancelled");
  const workHoursToday=mergedCategoryHours(todayTasks,"Work");
  const personalHoursToday=mergedCategoryHours(todayTasks,"Personal");
  const learningHoursToday=mergedCategoryHours(todayTasks,"Learning");

  // Work hours this week (Mon–Sun of current calendar week) — overlap-safe per day then sum
  const workHoursWeek=(()=>{
    const todayDate=new Date(td+"T00:00:00");
    const dow=todayDate.getDay(); // 0=Sun
    const daysFromMon=(dow===0?6:dow-1);
    const weekStart=addDays(td,-daysFromMon); // this Monday
    let total=0;
    for(let i=0;i<7;i++){
      const date=addDays(weekStart,i);
      if(date>td) break; // don't count future days
      const dayTasks=allInst.filter(t=>taskDate(t)===date&&t.status!=="Cancelled");
      total+=mergedCategoryHours(dayTasks,"Work");
    }
    return total;
  })();

  return{weeklyVelocity,avgAgeDays,peakHourLabel,prioAdherence,overdueRate,onHold,trend7,
    workHoursToday,personalHoursToday,learningHoursToday,workHoursWeek};
}

let SC_STATE={view:"list",selDate:localToday(),calYear:new Date().getFullYear(),calMonth:new Date().getMonth(),fsStatus:"All",fsCat:"All",q:""};
function renderSched(allInst){
  return `<div class="view">
    <div class="view-header">
      <h2 class="view-title">Scheduled</h2>
      <div class="toggle">
        <button class="tog-btn${SC_STATE.view==="list"?" tog-on":""}" data-scview="list">☰</button>
        <button class="tog-btn${SC_STATE.view==="tl"?" tog-on":""}" data-scview="tl">⏱</button>
        <button class="tog-btn${SC_STATE.view==="cal"?" tog-on":""}" data-scview="cal">▦</button>
      </div>
    </div>
    ${SC_STATE.view==="list"?renderDayList(allInst):""}
    ${SC_STATE.view==="tl"?renderTL(allInst):""}
    ${SC_STATE.view==="cal"?renderCal(allInst):""}
  </div>`;
}
function renderDayList(allInst){
  const filtered=allInst.filter(t=>
    (SC_STATE.fsStatus==="All"||t.status===SC_STATE.fsStatus)&&
    (SC_STATE.fsCat==="All"||t.category===SC_STATE.fsCat)&&
    (!SC_STATE.q||t.name.toLowerCase().includes(SC_STATE.q.toLowerCase())||(Array.isArray(t.tags)&&t.tags.some(g=>g.includes(SC_STATE.q.toLowerCase())))));
  const map={};
  filtered.forEach(t=>{const d=taskDate(t)||"no-date";if(!map[d])map[d]=[];map[d].push(t);});
  const pw={Critical:0,High:1,Medium:2,Low:3};
  Object.keys(map).forEach(d=>{map[d].sort((a,b)=>{const ac=a.status==="Completed"?1:0,bc=b.status==="Completed"?1:0;if(ac!==bc)return ac-bc;return(pw[a.priority]??2)-(pw[b.priority]??2);});});
  const groups=Object.entries(map).sort(([a],[b])=>a.localeCompare(b));
  const td=localToday();
  

  // Overlap-safe daily hours per category
  function dayHoursByCat(tasks){
    return CATEGORIES.reduce((acc,c)=>{acc[c]=mergedCategoryHours(tasks,c);return acc;},{});
  }

  return `
    <input class="srch" id="sc-q" placeholder="🔍 Search scheduled..." value="${e(SC_STATE.q)}"/>
    <div class="f-row">
      <select class="fsel" id="sc-fs">
        <option value="All">All Status</option>${STATUSES.map(s=>`<option${SC_STATE.fsStatus===s?" selected":""}>${s}</option>`).join("")}
      </select>
      <select class="fsel" id="sc-fcat">
        <option value="All">All Category</option>${allCategories().map(c=>`<option${SC_STATE.fsCat===c?" selected":""}>${c}</option>`).join("")}
      </select>
    </div>
    ${groups.length===0?`<div class="empty-state">
      <div class="empty-ico">📅</div>
      <div class="empty-txt">No scheduled tasks</div>
      <div class="empty-sub">Schedule tasks from your backlog, or tap <b style="color:#60a5fa">＋</b> to create one</div>
    </div>`:
    groups.map(([date,tasks])=>{
      const isToday=date===td,isPast=date!=="no-date"&&date<td;
      const active=tasks.filter(t=>t.status!=="Completed"&&t.status!=="Cancelled");

}
function renderTCard(t){
  const c=SC[t.status]||SC["Not Started"]; const over=isOverdue(t);

          <div style="flex:1;height:4px;background:#1e293b;border-radius:2px;overflow:hidden"><div style="height:100%;width:${subPct}%;background:${subPct===100?"#34d399":"#3b82f6"};border-radius:2px;transition:width .3s"></div></div>
          <span style="font-size:10px;color:${subPct===100?"#34d399":"#60a5fa"};font-weight:600;white-space:nowrap">✅ ${subDone}/${subs.length}</span>

}
function renderTL(allInst){
  const tasks=allInst.filter(t=>taskDate(t)===SC_STATE.selDate&&t.startTime);
  
  const hrsEntries=CATEGORIES.map(c=>({c,h:mergedCategoryHours(tasks,c)})).filter(x=>x.h>0);
  const ROW_H=56; // px per hour row
  const allHours=Array.from({length:24},(_,i)=>i);

  // Build positioned task blocks
  // Each task: top = startMins/60 * ROW_H, height = durationMins/60 * ROW_H (min 28px)
  function taskBlock(t){
    const [sh,sm]=t.startTime.split(":").map(Number);
    const startPx=(sh*60+sm)/60*ROW_H;
    const span=taskMinuteSpan(t);
    const heightPx=span?Math.max(28,(span[1]-span[0])/60*ROW_H):28;
    const c=SC[t.status]||SC["Not Started"];
    const over=isOverdue(t);
    return{t,startPx,heightPx,c,over};
  }
  const blocks=tasks.map(taskBlock).sort((a,b)=>a.startPx-b.startPx);

  return `
    <div class="d-nav">
      <button class="n-arr" data-sc-date-offset="-1">‹</button>
      <span class="d-nav-l">${fmtDate(SC_STATE.selDate)}</span>
      <button class="n-arr" data-sc-date-offset="1">›</button>
    </div>
    ${hrsEntries.length>0?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;padding:6px 8px;background:#0a0a0f;border-radius:7px;border:1px solid #1e293b">
      <span style="font-size:10px;color:#475569;font-weight:600;align-self:center">⏱</span>
      ${hrsEntries.map(({c,h})=>`<span style="font-size:10px;background:${catColor(c)}18;color:${catColor(c)};border:1px solid ${catColor(c)}44;border-radius:5px;padding:2px 7px;font-weight:600">${c}: ${fmtHours(h)}</span>`).join("")}
    </div>`:""}
    <div class="tl-max" style="overflow-y:auto;max-height:calc(100vh - 280px)">
      <div style="display:flex;">
        <!-- Hour labels column -->
        <div style="width:44px;flex-shrink:0;">
          ${allHours.map(h=>`<div style="height:${ROW_H}px;color:#334155;font-size:10px;padding-top:5px;text-align:right;padding-right:6px;border-bottom:1px solid #0f172a">${p2(h)}:00</div>`).join("")}
        </div>
        <!-- Task area: absolute positioning -->
        <div style="flex:1;position:relative;border-left:1px solid #1e293b;">
          <!-- Hour grid lines -->
          ${allHours.map(h=>`<div style="position:absolute;top:${h*ROW_H}px;left:0;right:0;height:${ROW_H}px;border-bottom:1px solid #0f172a;pointer-events:none"></div>`).join("")}
          <!-- Task blocks -->
          ${blocks.map(({t,startPx,heightPx,c,over})=>`
            <div data-open-task="${t.scheduledId}" style="position:absolute;top:${startPx}px;left:4px;right:4px;height:${heightPx}px;
              background:${over?"#1c0a0a":c.bg};border-left:3px solid ${over?"#ef4444":c.border};
              border-radius:5px;padding:4px 7px;cursor:pointer;overflow:hidden;z-index:2;
              border:1px solid ${over?"#7f1d1d":c.border}33;">
              <div style="color:${over?"#f87171":c.text};font-weight:600;font-size:11px;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(t.name)}${over?" ⏰":""}</div>
              ${heightPx>34?`<div style="color:#64748b;font-size:10px;margin-top:1px">${t.startTime}${t.endTime?` — ${t.endTime}`:""}${taskHours(t)?` · ${fmtHours(taskHours(t))}`:""}
                <span style="color:${catColor(t.category)||"#64748b"};margin-left:4px">${t.category}</span></div>`:""}
            </div>`).join("")}
          <!-- Total height spacer -->
          <div style="height:${24*ROW_H}px;pointer-events:none"></div>
        </div>
      </div>
    </div>`;
}

                ${!["Completed","Cancelled"].includes(t.status)?`<button class="swipe-act-btn" data-mx-cancel="${t.scheduledId}" style="background:#dc2626;color:#fff;padding:0 10px">❌<span>Cancel</span></button>`:""}
              </div>

                      <div style="flex:1;height:3px;background:#1e293b;border-radius:2px;overflow:hidden"><div style="height:100%;width:${subPct}%;background:${subPct===100?"#34d399":"#3b82f6"};border-radius:2px"></div></div>
                      <span style="font-size:9px;color:${subPct===100?"#34d399":"#60a5fa"};font-weight:700">${subDone}/${subs.length}</span>
                    </div>`:""}
                    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
                      ${taskDate(t)?`<span style="font-size:10px;background:#111827;color:${over?"#f87171":"#64748b"};border-radius:4px;padding:1px 5px;border:1px solid ${over?"#7f1d1d":"#1e293b"}">${over?"⏰ ":""}${fmtShort(taskDate(t))}</span>`:""}
                      ${t.taskType==="recurring"?`<span style="font-size:10px;color:#60a5fa">↻</span>`:""}
                      <span style="font-size:10px;color:${PC[t.priority]}">● ${t.priority}</span>
                      <span style="font-size:10px;color:${catColor(t.category)||"#475569"}">${t.category}</span>
                      ${tSecs>0?`<span style="font-size:9px;color:#64748b">⏱${fmtSecs(tSecs)}</span>`:""}
                      ${t.important?`<span style="font-size:10px;color:#4ade80">⚑</span>`:""}
                      ${t.urgent?`<span style="font-size:10px;color:#fbbf24">⚡</span>`:""}
                    </div>
                    ${Array.isArray(t.tags)&&t.tags.length>0?`<div class="t-row" style="margin-top:4px">${t.tags.slice(0,2).map(g=>`<span class="tag" style="font-size:9px">#${e(g)}</span>`).join("")}${t.tags.length>2?`<span class="tag" style="font-size:9px">+${t.tags.length-2}</span>`:""}</div>`:""}
                  </div>
                </div>`}).join("")}
            </div>`}
        </div>`;}).join("")}
      <div class="cancel-zone" id="kb-cancel-zone" data-kb-col="Cancelled">🗑 Drop here to Cancel</div>
    </div>
    ${pool.length===0?`<div class="empty-state">
      <div class="empty-ico">${KB_STATE.mode==="overdue"?"🎉":KB_STATE.mode==="today"?"☀️":"📋"}</div>
      <div class="empty-txt">${KB_STATE.mode==="overdue"?"All caught up — no overdue tasks!":KB_STATE.mode==="today"?"Nothing scheduled for today":KB_STATE.mode==="date"?`Nothing on ${fmtDate(KB_STATE.selDate)}`:"No tasks yet"}</div>
      <div class="empty-sub">${KB_STATE.mode==="today"?"Add tasks to your schedule from the Backlog tab":"Use the Schedule tab to assign tasks to dates"}</div>
    </div>`:""}
  </div>`;
}

// ─── CONTENT BINDINGS ────────────────────────────────────────────────────────
function bindContent(allInst){
  const content=document.getElementById("content");

  // open task
  content.querySelectorAll("[data-open-task]").forEach(el=>{
    el.addEventListener("click",ev=>{
      ev.stopPropagation();
      const sid=el.dataset.openTask;
      const task=allInst.find(t=>t.scheduledId===sid);
      if(task) openTaskModal({...task,_masterId:getMasterId(task)});
    });
  });

  // AI insights button (dashboard only)
  const aiBtn=document.getElementById("ai-insights-btn");
  if(aiBtn) aiBtn.addEventListener("click",async()=>{
    if(DASH_AI.loading) return;
    const keyEl=document.getElementById("ai-api-key");
    const apiKey=(keyEl?keyEl.value.trim():DASH_AI.apiKey)||"";
    if(!apiKey){
      DASH_AI={...DASH_AI,error:"Please enter your Anthropic API key above."};
      render(); return;
    }
    DASH_AI={loading:true,result:null,error:null,apiKey};
    render();
    await dbSetSetting("apiKey",apiKey); // persist for next session
    try{
      const result=await aiProductivityInsights(allInst,apiKey);
      DASH_AI={loading:false,result,error:null,apiKey};
    }catch(err){
      const msg=err?.message||String(err)||"Unknown error";
      const hint=msg.includes("401")||msg.includes("auth")||msg.includes("invalid_api_key")
        ? "Invalid API key. Check your key at console.anthropic.com."
        : msg.includes("CORS")||msg.includes("Failed to fetch")
        ? "Network error. Check your connection and try again."
        : `Error: ${msg}`;
      DASH_AI={loading:false,result:null,error:hint,apiKey};
    }
    render();
  });

  // ── Backlog bindings ──
  if(STATE.tab==="backlog"){
    const blSearch=document.getElementById("bl-search");
    if(blSearch) blSearch.addEventListener("input",e=>{BL_STATE.search=e.target.value;render();});
    const blFp=document.getElementById("bl-fp");
    if(blFp) blFp.addEventListener("change",e=>{BL_STATE.fp=e.target.value;render();});
    const blFc=document.getElementById("bl-fc");
    if(blFc) blFc.addEventListener("change",e=>{BL_STATE.fc=e.target.value;render();});
    const blBulkBtn=document.getElementById("bl-bulk-btn");
    if(blBulkBtn) blBulkBtn.addEventListener("click",()=>{BL_STATE.bulk=!BL_STATE.bulk;BL_STATE.sel=new Set();render();});
    const blAdd=document.getElementById("bl-add");
    if(blAdd) blAdd.addEventListener("click",()=>openTaskFormModal(null));
    const blSelAll=document.getElementById("bl-sel-all");
    if(blSelAll) blSelAll.addEventListener("click",()=>{
      const filtered=STATE.backlog.filter(t=>t.name.toLowerCase().includes(BL_STATE.search.toLowerCase())&&(BL_STATE.fp==="All"||t.priority===BL_STATE.fp)&&(BL_STATE.fc==="All"||t.category===BL_STATE.fc));
      BL_STATE.sel=new Set(filtered.map(t=>t.id));render();
    });
    const blSelNone=document.getElementById("bl-sel-none");
    if(blSelNone) blSelNone.addEventListener("click",()=>{BL_STATE.sel=new Set();render();});
    const blBulkDel=document.getElementById("bl-bulk-del");
    if(blBulkDel) blBulkDel.addEventListener("click",async()=>{
      STATE.backlog=STATE.backlog.filter(t=>!BL_STATE.sel.has(t.id));
      await saveBacklog(); showToast(`${BL_STATE.sel.size} deleted`,"err"); BL_STATE.sel=new Set(); BL_STATE.bulk=false; render();
    });
    // Note: bl-check, bl-sched, bl-clone, bl-edit, bl-del are all bound in attachCardSwipes()
  }

  // ── Scheduled bindings ──
  if(STATE.tab==="sched"){
    content.querySelectorAll("[data-scview]").forEach(el=>{
      el.addEventListener("click",()=>{SC_STATE.view=el.dataset.scview;render();});
    });
    const scQ=document.getElementById("sc-q");
    if(scQ) scQ.addEventListener("input",e=>{SC_STATE.q=e.target.value;render();});
    const scFs=document.getElementById("sc-fs");
    if(scFs) scFs.addEventListener("change",e=>{SC_STATE.fsStatus=e.target.value;render();});
    const scFcat=document.getElementById("sc-fcat");
    if(scFcat) scFcat.addEventListener("change",e=>{SC_STATE.fsCat=e.target.value;render();});
    content.querySelectorAll("[data-sc-date-offset]").forEach(el=>{
      el.addEventListener("click",()=>{SC_STATE.selDate=addDays(SC_STATE.selDate,parseInt(el.dataset.scDateOffset));render();});
    });
    const calPrev=document.getElementById("cal-prev");
    if(calPrev) calPrev.addEventListener("click",()=>{
      const d=new Date(SC_STATE.calYear,SC_STATE.calMonth-1,1); SC_STATE.calYear=d.getFullYear(); SC_STATE.calMonth=d.getMonth(); render();
    });
    const calNext=document.getElementById("cal-next");
    if(calNext) calNext.addEventListener("click",()=>{
      const d=new Date(SC_STATE.calYear,SC_STATE.calMonth+1,1); SC_STATE.calYear=d.getFullYear(); SC_STATE.calMonth=d.getMonth(); render();
    });
    content.querySelectorAll("[data-cal-date]").forEach(el=>{
      el.addEventListener("click",()=>{SC_STATE.selDate=el.dataset.calDate;render();});
    });
  }

  // ── Matrix bindings ──
  if(STATE.tab==="matrix"){
    content.querySelectorAll("[data-mx-mode]").forEach(el=>{
      el.addEventListener("click",()=>{MX_STATE.mode=el.dataset.mxMode;render();});
    });
    const mxFcat=document.getElementById("mx-fcat");
    if(mxFcat) mxFcat.addEventListener("change",e=>{MX_STATE.fsCat=e.target.value;render();});
  }

  // ── Kanban bindings ──
  if(STATE.tab==="kanban"){
    content.querySelectorAll("[data-kb-mode]").forEach(el=>{
      el.addEventListener("click",()=>{KB_STATE.mode=el.dataset.kbMode;render();});
    });
    const kbFcat=document.getElementById("kb-fcat");
    if(kbFcat) kbFcat.addEventListener("change",e=>{KB_STATE.fsCat=e.target.value;render();});
    content.querySelectorAll("[data-kb-date-offset]").forEach(el=>{
      el.addEventListener("click",()=>{KB_STATE.selDate=addDays(KB_STATE.selDate,parseInt(el.dataset.kbDateOffset));render();});
    });
    // drag-drop kanban
    content.querySelectorAll("[data-kb-card]").forEach(card=>{
      card.addEventListener("dragstart",e=>{
        KB_DRAG={scheduledId:card.dataset.kbCard, _masterId:card.dataset.kbMid, instanceDate:card.dataset.kbIdate||undefined};
        setTimeout(()=>card.style.opacity="0.4",0);
      });
      card.addEventListener("dragend",()=>{card.style.opacity="1";KB_DRAG=null;});
    });
    content.querySelectorAll("[data-kb-col]").forEach(zone=>{
      zone.addEventListener("dragover",e=>{e.preventDefault();zone.style.outline="2px solid #3b82f6";});
      zone.addEventListener("dragleave",e=>{if(!zone.contains(e.relatedTarget))zone.style.outline="none";});
      zone.addEventListener("drop",async e=>{
        e.preventDefault(); zone.style.outline="none";
        if(!KB_DRAG) return;
        const newStatus=zone.dataset.kbCol;
        if(newStatus==="Cancelled"){
          openCancelModal(KB_DRAG); KB_DRAG=null; return;
        }
        if(newStatus==="On Hold"){
          const drag={...KB_DRAG}; KB_DRAG=null;
          openReasonModal("Put On Hold","Why is this task being put on hold?","⏸️ Confirm Hold","#92400e",async(reason)=>{
            await changeStatus(drag._masterId,drag.instanceDate,"On Hold",reason);
          });
          return;
        }
        const t=allInst.find(x=>x.scheduledId===KB_DRAG.scheduledId);
        if(t&&t.status!==newStatus) await changeStatus(KB_DRAG._masterId,KB_DRAG.instanceDate,newStatus,"");
        KB_DRAG=null;
      });
    });
    // tap to open task (not the drag handle area)
    content.querySelectorAll("[data-kb-card]").forEach(card=>{
      const inner=card.querySelector("[data-open-task]");
      if(inner){
        inner.addEventListener("click",e=>{
          e.stopPropagation();
          const sid=inner.dataset.openTask;
          const task=allInst.find(t=>t.scheduledId===sid);
          if(task) openTaskModal({...task,_masterId:getMasterId(task)});
        });
      }
    });
  }
  // Attach swipe gestures after all bindings
  attachCardSwipes(allInst);
  // Reports tab bindings
  if(STATE.tab==="reports") bindReports(allInst);
}

// ─── OPERATIONS ───────────────────────────────────────────────────────────────
async function changeStatus(masterSId,iDate,newS,reason=""){
  const snapshot=[...STATE.scheduled.map(t=>({...t}))];
  STATE.scheduled=STATE.scheduled.map(t=>{
    if((t.masterScheduledId||t.scheduledId)!==masterSId) return t;
    if(t.taskType==="recurring"&&iDate){
      const ov={...(t.instanceOverrides||{})};
      const ph=(ov[iDate]?.history)||[];
      ov[iDate]={status:newS,reason,history:[...ph,{status:newS,at:new Date().toISOString(),reason}]};
      return{...t,instanceOverrides:ov};
    }
    const h=[...(t.statusHistory||[]),{status:newS,at:new Date().toISOString(),reason}];
    return{...t,status:newS,statusHistory:h,cancelReason:newS==="Cancelled"?reason:t.cancelReason};
  });
  await saveScheduled();
  haptic(10);
  const statusIcons={"Completed":"✅","Cancelled":"❌","On Hold":"⏸️","In Progress":"⚡","Not Started":"⏳"};
  showToast(`${statusIcons[newS]||""} ${newS}`, newS==="Cancelled"?"err":"ok",
    newS==="Cancelled"||newS==="Completed"?async()=>{
      STATE.scheduled=snapshot; invalidateCache(); await saveScheduled(); render();
    }:null
  );
  render();
}
async function editMeta(masterSId,upd){
  STATE.scheduled=STATE.scheduled.map(t=>(t.masterScheduledId||t.scheduledId)===masterSId?{...t,...upd}:t);
  await saveScheduled(); showToast("Updated"); render();
}
async function addNote(masterSId,iDate,text){
  STATE.scheduled=STATE.scheduled.map(t=>{
    if((t.masterScheduledId||t.scheduledId)!==masterSId) return t;
    return{...t,notes:[...(t.notes||[]),{id:gid(),text,instanceDate:iDate,createdAt:new Date().toISOString()}]};
  });
  await saveScheduled();
}
async function unscheduleSC(masterSId){
  const task=STATE.scheduled.find(t=>(t.masterScheduledId||t.scheduledId)===masterSId);
  if(!task){showToast("Not found","err");return;}
  STATE.backlog=[{id:gid(),name:task.name,priority:task.priority,category:task.category,tags:task.tags||[],important:!!task.important,urgent:!!task.urgent,createdAt:new Date().toISOString()},...STATE.backlog];
  STATE.scheduled=STATE.scheduled.filter(t=>(t.masterScheduledId||t.scheduledId)!==masterSId);
  await saveBacklog(); await saveScheduled(); showToast("Moved back to backlog"); render();
}

// Subtask operations
async function addSubtask(masterSId, name){
  STATE.scheduled=STATE.scheduled.map(t=>{
    if((t.masterScheduledId||t.scheduledId)!==masterSId) return t;
    const sub={id:gid(),name,done:false,createdAt:new Date().toISOString()};
    return{...t,subtasks:[...(t.subtasks||[]),sub]};
  });
  await saveScheduled();
}
async function toggleSubtask(masterSId, subId){
  STATE.scheduled=STATE.scheduled.map(t=>{
    if((t.masterScheduledId||t.scheduledId)!==masterSId) return t;
    const subtasks=(t.subtasks||[]).map(s=>s.id===subId?{...s,done:!s.done,doneAt:s.done?null:new Date().toISOString()}:s);
    return{...t,subtasks};
  });
  await saveScheduled();
}
async function deleteSubtask(masterSId, subId){
  STATE.scheduled=STATE.scheduled.map(t=>{
    if((t.masterScheduledId||t.scheduledId)!==masterSId) return t;
    return{...t,subtasks:(t.subtasks||[]).filter(s=>s.id!==subId)};
  });
  await saveScheduled();
}

// Time tracking operations
let ACTIVE_TIMER={masterSId:null,startedAt:null};
async function startTimer(masterSId){
  ACTIVE_TIMER={masterSId,startedAt:Date.now()};
  showToast("⏱ Timer started");
  render();
}
async function stopTimer(){
  if(!ACTIVE_TIMER.masterSId) return;
  const elapsed=Math.round((Date.now()-ACTIVE_TIMER.startedAt)/1000);
  if(elapsed<5){ACTIVE_TIMER={masterSId:null,startedAt:null};render();return;}
  STATE.scheduled=STATE.scheduled.map(t=>{
    if((t.masterScheduledId||t.scheduledId)!==ACTIVE_TIMER.masterSId) return t;
    const entry={id:gid(),startedAt:new Date(ACTIVE_TIMER.startedAt).toISOString(),endedAt:new Date().toISOString(),seconds:elapsed};
    return{...t,timeEntries:[...(t.timeEntries||[]),entry]};
  });
  await saveScheduled();
  showToast(`⏱ Logged ${fmtSecs(elapsed)}`);
  ACTIVE_TIMER={masterSId:null,startedAt:null};
  render();
}
function totalSecondsLogged(task){
  return(task.timeEntries||[]).reduce((a,e)=>a+(e.seconds||0),0);
}
function fmtSecs(s){
  if(!s) return "0m";
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  if(h>0) return `${h}h ${m}m`;
  if(m>0) return `${m}m ${sec}s`;
  return `${sec}s`;
}
function fmtTimer(s){
  const m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
}

function e(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ─── MODALS ───────────────────────────────────────────────────────────────────
let MODAL_STACK=[];
function pushModal(html,onClose){
  MODAL_STACK.push({html,onClose});
  renderModalStack();
}
function popModal(){
  const m=MODAL_STACK.pop();
  if(m&&m.onClose) m.onClose();
  renderModalStack();
}
function clearModals(){MODAL_STACK=[];renderModalStack();}
function renderModalStack(){
  const root=document.getElementById("modal-root");
  if(MODAL_STACK.length===0){root.innerHTML="";return;}
  const top=MODAL_STACK[MODAL_STACK.length-1];
  root.innerHTML=`<div class="overlay" id="modal-overlay">${top.html}</div>`;
  document.getElementById("modal-overlay").addEventListener("click",e=>{if(e.target.id==="modal-overlay")popModal();});
}

// ─── REASON MODAL ────────────────────────────────────────────────────────────
function openReasonModal(title, placeholder, confirmLabel, confirmBg, onConfirm){
  const html=`<div class="modal" id="reason-modal">
    <div class="m-hdr"><h3 class="m-title">${e(title)}</h3><button class="close-btn" id="rm-close">✕</button></div>
    <label class="lbl">Reason *</label>
    <textarea class="ta" rows="3" id="rm-reason" placeholder="${e(placeholder)}"></textarea>
    <div class="m-act">
      <button class="c-btn" id="rm-back">Back</button>
      <button class="o-btn" id="rm-confirm" style="background:${confirmBg}">${e(confirmLabel)}</button>
    </div>
  </div>`;
  pushModal(html,null);
  const modal=document.getElementById("reason-modal");
  modal.querySelector("#rm-close").addEventListener("click",popModal);
  modal.querySelector("#rm-back").addEventListener("click",popModal);
  modal.querySelector("#rm-confirm").addEventListener("click",async()=>{
    const reason=modal.querySelector("#rm-reason").value.trim();
    if(!reason){
      const ta=modal.querySelector("#rm-reason");
      if(ta){ta.style.borderColor="#ef4444";ta.placeholder="Please enter a reason";}
      return;
    }
    popModal();
    await onConfirm(reason);
  });
}

// ─── CANCEL MODAL ────────────────────────────────────────────────────────────
function openCancelModal(taskRef){
  openReasonModal(
    `Cancel "${taskRef.name||"task"}"`,
    "Why is this being cancelled?",
    "❌ Confirm Cancel",
    "#7f1d1d",
    async(reason)=>{
      await changeStatus(taskRef._masterId,taskRef.instanceDate,"Cancelled",reason);
      clearModals();
    }
  );
}

// ─── TASK FORM MODAL ──────────────────────────────────────────────────────────
function openTaskFormModal(task, templateData=null){
  const src=templateData||task;
  let name=src?.name||"", prio=src?.priority||"Medium", cat=src?.category||allCategories()[0]||"Work";
  let tags=[...((src?.tags)||[])], imp=!!src?.important, urg=!!src?.urgent;
  let effort=src?.effort||"";
  let tagInpVal="";

  function updateTagBox(){
    const box=document.getElementById("tf-tag-box"); if(!box) return;
    const inp=document.getElementById("tf-taginp");
    Array.from(box.children).forEach(c=>{if(c!==inp)c.remove();});
    box.insertAdjacentHTML("afterbegin",tags.map(t=>`<span class="tag" style="display:inline-flex;align-items:center;gap:3px">#${e(t)}<button style="background:none;border:none;color:#7dd3fc;cursor:pointer;padding:0;margin-left:2px;font-size:10px" data-tf-rmtag="${e(t)}">✕</button></span>`).join(""));
    if(inp) inp.placeholder=tags.length===0?"Add tag…":"";
    box.querySelectorAll("[data-tf-rmtag]").forEach(b=>b.addEventListener("click",()=>{tags=tags.filter(x=>x!==b.dataset.tfRmtag);updateTagBox();updateSugg();}));
  }

  function updateSugg(){
    const existing=document.getElementById("tf-sugg");
    const ti=document.getElementById("tf-taginp");
    const liveVal=(ti?ti.value:tagInpVal).toLowerCase();
    const suggs=liveVal.length>0?TAG_SUGG.filter(s=>s.includes(liveVal)&&!tags.includes(s)):[];
    if(suggs.length===0){if(existing)existing.remove();return;}
    const html=`<div class="sugg" id="tf-sugg">${suggs.map(s=>`<div class="sugg-i" data-tf-sugg="${s}">#${s}</div>`).join("")}</div>`;
    if(existing){existing.outerHTML=html;}else{const box=document.getElementById("tf-tag-box");if(box)box.insertAdjacentHTML("afterend",html);}
    document.getElementById("tf-sugg")?.querySelectorAll("[data-tf-sugg]").forEach(b=>b.addEventListener("mousedown",ev=>{ev.preventDefault();addTag(b.dataset.tfSugg);}));
  }

  function addTag(v){
    const t=v.trim().toLowerCase().replace(/\s+/g,"-").replace(/,/g,"");
    if(t&&!tags.includes(t)) tags=[...tags,t];
    tagInpVal="";
    const ti=document.getElementById("tf-taginp");
    if(ti)ti.value="";
    updateTagBox();
    document.getElementById("tf-sugg")?.remove();
    if(ti)ti.focus();
  }

  const cats=allCategories();
  const effortLevels=["XS","S","M","L","XL"];

  function tmpl(){
    return `<div class="modal" id="task-form-modal">
      <div class="m-hdr">
        <h3 class="m-title">${task?"✏️ Edit Task":"➕ New Task"}</h3>
        <div style="display:flex;gap:6px;align-items:center">
          ${STATE.templates.length>0?`<select class="fsel" id="tf-tmpl" style="font-size:11px;padding:4px 6px;max-width:110px"><option value="">📋 Template</option>${STATE.templates.map(t=>`<option value="${t.id}">${e(t.name)}</option>`).join("")}</select>`:""}
          <button class="close-btn" id="tf-close">✕</button>
        </div>
      </div>
      <label class="lbl">Task Name *</label>
      <input class="inp" id="tf-name" placeholder="What needs to be done?" value="${e(name)}" autofocus/>
      <label class="lbl">Priority</label>
      <div class="opt-row" id="tf-prio-row">${PRIORITIES.map(p=>`<button class="opt-btn" style="${prio===p?`background:${PC[p]}33;border:1px solid ${PC[p]};color:${PC[p]}`:""}" data-tf-prio="${p}">${p}</button>`).join("")}</div>
      <label class="lbl">Category</label>
      <div class="opt-row" id="tf-cat-row">${cats.map(c=>`<button class="opt-btn${cat===c?" opt-on":""}" data-tf-cat="${c}">${c}</button>`).join("")}</div>
      <label class="lbl">Effort <span style="font-weight:400;color:#475569;text-transform:none;font-size:10px">(optional)</span></label>
      <div class="opt-row">${effortLevels.map(ef=>`<button class="opt-btn${effort===ef?" opt-on":""}" data-tf-effort="${ef}" style="${effort===ef?"background:#1e3a5f;border-color:#3b82f6;color:#60a5fa":""}">${ef}</button>`).join("")}</div>
      <label class="lbl">Tags <span style="color:#334155;text-transform:none;font-weight:400;font-size:10px">(Enter or comma to add)</span></label>
      <div class="tag-box" id="tf-tag-box">

  function bind(){
    document.getElementById("tf-close").addEventListener("click",popModal);
    document.getElementById("tf-cancel").addEventListener("click",popModal);
    const nameEl=document.getElementById("tf-name");
    if(nameEl) nameEl.addEventListener("input",ev=>{name=ev.target.value;});
    document.getElementById("tf-imp")?.addEventListener("change",ev=>{imp=ev.target.checked;});
    document.getElementById("tf-urg")?.addEventListener("change",ev=>{urg=ev.target.checked;});

    // Priority buttons
    document.querySelectorAll("[data-tf-prio]").forEach(b=>b.addEventListener("click",()=>{
      prio=b.dataset.tfPrio;
      document.querySelectorAll("[data-tf-prio]").forEach(btn=>{
        const on=btn.dataset.tfPrio===prio;
        btn.style.background=on?`${PC[prio]}33`:""; btn.style.border=on?`1px solid ${PC[prio]}`:""; btn.style.color=on?PC[prio]:"";
      });
    }));

    // Category buttons
    document.querySelectorAll("[data-tf-cat]").forEach(b=>b.addEventListener("click",()=>{
      cat=b.dataset.tfCat;
      document.querySelectorAll("[data-tf-cat]").forEach(btn=>btn.classList.toggle("opt-on",btn.dataset.tfCat===cat));
    }));

    // Effort buttons
    document.querySelectorAll("[data-tf-effort]").forEach(b=>b.addEventListener("click",()=>{
      effort=effort===b.dataset.tfEffort?"":b.dataset.tfEffort;
      document.querySelectorAll("[data-tf-effort]").forEach(btn=>{
        const on=btn.dataset.tfEffort===effort;
        btn.classList.toggle("opt-on",on);
        btn.style.background=on?"#1e3a5f":""; btn.style.borderColor=on?"#3b82f6":""; btn.style.color=on?"#60a5fa":"";
      });
    }));

    // Tag remove buttons
    document.querySelectorAll("[data-tf-rmtag]").forEach(b=>b.addEventListener("click",()=>{tags=tags.filter(x=>x!==b.dataset.tfRmtag);updateTagBox();updateSugg();}));

    // Tag input
    const ti=document.getElementById("tf-taginp");
    if(ti){
      ti.addEventListener("input",ev=>{tagInpVal=ev.target.value;updateSugg();});
      ti.addEventListener("blur",()=>setTimeout(()=>{tagInpVal="";document.getElementById("tf-sugg")?.remove();},200));
      ti.addEventListener("keydown",ev=>{
        if(ev.key==="Enter"||ev.key===","){ev.preventDefault();const v=ti.value.replace(/,/g,"").trim();if(v)addTag(v);}
        if(ev.key==="Backspace"&&ti.value===""){tags=tags.slice(0,-1);updateTagBox();updateSugg();}
      });
    }

    // Template loader
    document.getElementById("tf-tmpl")?.addEventListener("change",ev=>{
      const t=STATE.templates.find(x=>x.id===ev.target.value);
      if(!t)return;
      name=t.name||""; prio=t.priority||"Medium"; cat=t.category||"Work";
      tags=[...(t.tags||[])]; imp=!!t.important; urg=!!t.urgent; effort=t.effort||"";
      const overlay=document.getElementById("modal-overlay");
      if(overlay){overlay.innerHTML=tmpl();bind();}
    });

    // Save as template
    document.getElementById("tf-save-tmpl")?.addEventListener("click",async()=>{
      const n=(document.getElementById("tf-name")?.value||"").trim()||name;
      if(!n){showToast("Enter a name first","err");return;}
      const tmplObj={id:gid(),name:n,priority:prio,category:cat,tags:[...tags],important:imp,urgent:urg,effort,createdAt:new Date().toISOString()};
      STATE.templates=[...STATE.templates,tmplObj];
      await dbSaveTemplate(tmplObj);
      showToast("📌 Template saved!");
    });

    // Save task
    document.getElementById("tf-save").addEventListener("click",async()=>{
      name=(document.getElementById("tf-name")?.value||"").trim();
      if(!name)return;
      const ti=document.getElementById("tf-taginp");
      if(ti&&ti.value.trim())addTag(ti.value);
      imp=document.getElementById("tf-imp")?.checked||false;
      urg=document.getElementById("tf-urg")?.checked||false;
      if(task){
        STATE.backlog=STATE.backlog.map(t=>t.id===task.id?{...t,name,priority:prio,category:cat,tags:[...tags],important:imp,urgent:urg,effort}:t);
        await saveBacklog(); showToast("Updated ✓");
      } else {
        STATE.backlog=[{id:gid(),name,priority:prio,category:cat,tags:[...tags],important:imp,urgent:urg,effort,createdAt:new Date().toISOString()},...STATE.backlog];
        await saveBacklog(); haptic(10); showToast("Added ✓");
      }
      clearModals(); render();
    });
  }

  pushModal(tmpl(),null);
  bind();
}
