    return hist.length===0?`<div style="color:#475569;font-size:13px;text-align:center;padding:20px 0">No history</div>`:
      [...hist].reverse().map((h,i)=>{const sc=SC[h.status]||SC["Not Started"];return`
        <div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #0f172a" key="${i}">
          <div style="width:8px;height:8px;border-radius:50%;background:${sc.border};margin-top:5px;flex-shrink:0"></div>
          <div>
            <div style="color:${sc.text};font-weight:600;font-size:13px">${h.status}</div>
            <div style="color:#475569;font-size:11px">${new Date(h.at).toLocaleString()}</div>
            ${h.reason?`<div style="color:#94a3b8;font-size:12px;margin-top:2px">${e(h.reason)}</div>`:""}
          </div>
        </div>`;}).join("");
  }

  function bind(){
    const modal=document.getElementById("td-modal");
    const q=(sel)=>modal?modal.querySelector(sel):document.querySelector(sel);
    const qa=(sel)=>modal?modal.querySelectorAll(sel):document.querySelectorAll(sel);

    const tdClose=q("#td-close");
    if(tdClose) tdClose.addEventListener("click",popModal);

    qa("[data-td-sec]").forEach(b=>b.addEventListener("click",()=>{TD_STATE.sec=b.dataset.tdSec;rerender();}));

    // details tab
    const tdEdit=q("#td-edit");
    if(tdEdit) tdEdit.addEventListener("click",()=>{TD_STATE.editMode=true;rerender();});
    const tdEditCancel=q("#td-editcancel");
    if(tdEditCancel) tdEditCancel.addEventListener("click",()=>{TD_STATE.editMode=false;rerender();});
    const tdEditSave=q("#td-editsave");
    if(tdEditSave) tdEditSave.addEventListener("click",async()=>{
      const ni=q("#td-ename"); if(ni)eName=ni.value.trim();
      const ii=q("#td-eimp"); if(ii)eImp=ii.checked;
      const ui=q("#td-eurg"); if(ui)eUrg=ui.checked;
      await editMeta(task._masterId,{name:eName,priority:ePrio,category:eCat,important:eImp,urgent:eUrg});
      TD_STATE.editMode=false; clearModals();
    });
    qa("[data-td-eprio]").forEach(b=>b.addEventListener("click",()=>{ePrio=b.dataset.tdEprio;rerender();}));
    qa("[data-td-ecat]").forEach(b=>b.addEventListener("click",()=>{eCat=b.dataset.tdEcat;rerender();}));

    const tdResched=q("#td-resched");
    if(tdResched) tdResched.addEventListener("click",()=>{popModal();openScheduleModal(task,true);});
    const tdUnsched=q("#td-unsched");
    if(tdUnsched) tdUnsched.addEventListener("click",()=>{TD_STATE.showUns=true;rerender();});
    const tdUnsKeep=q("#td-uns-keep");
    if(tdUnsKeep) tdUnsKeep.addEventListener("click",()=>{TD_STATE.showUns=false;rerender();});
    const tdUnsConfirm=q("#td-uns-confirm");
    if(tdUnsConfirm) tdUnsConfirm.addEventListener("click",async()=>{await unscheduleSC(task._masterId);clearModals();});

    const tdStatusBtn=q("#td-status-btn");
    if(tdStatusBtn) tdStatusBtn.addEventListener("click",()=>{TD_STATE.showSM=!TD_STATE.showSM;TD_STATE.showCI=false;TD_STATE.showHold=false;rerender();});
    qa("[data-td-status]").forEach(b=>b.addEventListener("click",async()=>{
      const s=b.dataset.tdStatus;
      if(s==="Cancelled"){TD_STATE.showCI=true;TD_STATE.showSM=false;TD_STATE.showHold=false;rerender();}
      else if(s==="On Hold"){TD_STATE.showHold=true;TD_STATE.showSM=false;TD_STATE.showCI=false;rerender();}
      else{await changeStatus(task._masterId,task.instanceDate,s,"");clearModals();}
    }));
    const tdCiBack=q("#td-ci-back");
    if(tdCiBack) tdCiBack.addEventListener("click",()=>{TD_STATE.showCI=false;rerender();});
    const tdCiConfirm=q("#td-ci-confirm");
    if(tdCiConfirm) tdCiConfirm.addEventListener("click",async()=>{
      const r=q("#td-cr")?.value?.trim();
      if(!r)return;
      TD_STATE.cr=r;
      await changeStatus(task._masterId,task.instanceDate,"Cancelled",r);
      clearModals();
    });
    const tdHoldBack=q("#td-hold-back");
    if(tdHoldBack) tdHoldBack.addEventListener("click",()=>{TD_STATE.showHold=false;rerender();});
    const tdHoldConfirm=q("#td-hold-confirm");
    if(tdHoldConfirm) tdHoldConfirm.addEventListener("click",async()=>{
      const r=q("#td-hold-reason")?.value?.trim();
      if(!r)return;
      await changeStatus(task._masterId,task.instanceDate,"On Hold",r);
      clearModals();
    });

    // Timer buttons
    const timerStart=q("#td-timer-start");
    if(timerStart) timerStart.addEventListener("click",()=>{startTimer(task._masterId);});
    const timerStop=q("#td-timer-stop");
    if(timerStop) timerStop.addEventListener("click",()=>{stopTimer();});

    // Subtask add
    const subAdd=q("#td-sub-add");
    if(subAdd) subAdd.addEventListener("click",async()=>{
      const inp=q("#td-sub-inp");
      const val=inp?.value?.trim();
      if(!val) return;
      await addSubtask(task._masterId,val);
      // update local task subtasks
      task.subtasks=[...(task.subtasks||[]),{id:gid(),name:val,done:false,createdAt:new Date().toISOString()}];
      if(inp) inp.value="";
      rerender();
    });
    qa("[data-sub-toggle]").forEach(b=>b.addEventListener("click",async()=>{
      await toggleSubtask(task._masterId,b.dataset.subToggle);
      const sub=(task.subtasks||[]).find(s=>s.id===b.dataset.subToggle);
      if(sub) sub.done=!sub.done;
      rerender();
    }));
    qa("[data-sub-del]").forEach(b=>b.addEventListener("click",async()=>{
      await deleteSubtask(task._masterId,b.dataset.subDel);
      task.subtasks=(task.subtasks||[]).filter(s=>s.id!==b.dataset.subDel);
      rerender();
    }));

    // notes tab
    const tdNote=q("#td-note");
    if(tdNote) tdNote.addEventListener("input",e=>{TD_STATE.note=e.target.value;});
    const tdSaveNote=q("#td-save-note");
    if(tdSaveNote) tdSaveNote.addEventListener("click",async()=>{
      const noteText=(q("#td-note")?.value||"").trim();
      if(!noteText)return;
      const newNote={id:gid(),text:noteText,instanceDate:task.instanceDate,createdAt:new Date().toISOString()};
      await addNote(task._masterId,task.instanceDate,noteText);
      // Update local task.notes and relNotes immediately so the list refreshes
      task.notes=[...(task.notes||[]),newNote];
      TD_STATE.note="";
      TD_STATE.aiLoad=true;
      rerender(); // instant refresh — note appears right away
      const found=await aiExtractTasks(noteText);
      TD_STATE.aiLoad=false;
      if(found.length>0){TD_STATE.extr=found;TD_STATE.selEx=found.map(t=>t.id);TD_STATE.showEx=true;}
      rerender();
    });
    // "➕ Backlog" button on each note
    qa("[data-note-to-backlog]").forEach(btn=>{
      btn.addEventListener("click",async()=>{
        const noteId=btn.dataset.noteToBacklog;
        const note=(task.notes||[]).find(n=>n.id===noteId);
        if(!note) return;
        const newTask={id:gid(),name:note.text.split("\n")[0].slice(0,80),priority:"Medium",category:task.category||"Work",tags:task.tags||[],important:false,urgent:false,createdAt:new Date().toISOString()};
        STATE.backlog=[newTask,...STATE.backlog];
        await saveBacklog();
        showToast("Added to backlog ✓");
      });
    });
    qa("[data-ex-id]").forEach(cb=>{
      cb.addEventListener("change",()=>{
        const id=cb.dataset.exId;
        if(cb.checked) TD_STATE.selEx=[...TD_STATE.selEx,id];
        else TD_STATE.selEx=TD_STATE.selEx.filter(x=>x!==id);
        rerender();
      });
    });
    const tdExDismiss=q("#td-ex-dismiss");
    if(tdExDismiss) tdExDismiss.addEventListener("click",()=>{TD_STATE.showEx=false;rerender();});
    const tdExAdd=q("#td-ex-add");
    if(tdExAdd) tdExAdd.addEventListener("click",async()=>{
      const add=TD_STATE.extr.filter(t=>TD_STATE.selEx.includes(t.id));
      STATE.backlog=[...add.map(t=>({id:gid(),name:t.name,priority:t.priority||"Medium",category:t.category||"Work",tags:[],important:false,urgent:false,createdAt:new Date().toISOString()})),...STATE.backlog];
      await saveBacklog(); showToast(`${add.length} task(s) added`); TD_STATE.showEx=false; rerender();
    });
  }

  function rerender(){
    const overlay=document.getElementById("modal-overlay");
    if(overlay){overlay.innerHTML=tmpl();bind();}
  }

  pushModal(tmpl(),null);
  bind();
}

    if(!val||STATE.customCats.includes(val)||CATEGORIES.includes(val)){showToast("Already exists or empty","err");return;}
    STATE.customCats=[...STATE.customCats,val];

    showToast("Category added");
    popModal(); openSettingsModal();
  });
  document.querySelectorAll("[data-del-cat]").forEach(b=>b.addEventListener("click",async()=>{
    const c=b.dataset.delCat;
    STATE.customCats=STATE.customCats.filter(x=>x!==c);
    await dbSetSetting("customCats",STATE.customCats);
    popModal(); openSettingsModal();
  }));

  // Templates delete
  document.querySelectorAll("[data-del-tmpl]").forEach(b=>b.addEventListener("click",async()=>{
    const id=b.dataset.delTmpl;
    await dbDelete("templates",id);
    STATE.templates=STATE.templates.filter(t=>t.id!==id);
    popModal(); openSettingsModal();
  }));

    else { popModal(); openInstallGuideModal(); }

      return;
    }
    if(Notification.permission==="denied"){
      showToast("Blocked — go to browser Site Settings → Notifications → Allow","err");
      popModal(); openSettingsModal();
      return;
    }
    const r=await requestNotifPermission();
    if(r==="granted"){
      STATE.notifOk=true;
      showToast("Notifications enabled! ✓");
      // Send a test notification immediately to confirm it works
      try{ new Notification("✅ FlowTask",{body:"Notifications are working!",tag:"flowtask-test"}); }catch{}
    } else if(r==="unavailable"){
      showToast("Not supported in this browser","err");
    } else {
      showToast("Permission denied — enable in browser site settings","err");
    }
    popModal(); openSettingsModal();
  });

  const testBtn=document.getElementById("sett-notif-test");
  if(testBtn) testBtn.addEventListener("click",()=>{
    try{
      new Notification("🔔 FlowTask Test",{body:"Notifications are working correctly!",tag:"flowtask-test"});
      showToast("Test notification sent!");
    }catch(err){
      showToast(`Test failed: ${err.message}`,"err");
    }
  });

  document.getElementById("sett-export").addEventListener("click",async()=>{
    const blob=new Blob([JSON.stringify({backlog:STATE.backlog,scheduled:STATE.scheduled,templates:STATE.templates,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`flowtask-${localToday()}.json`; a.click(); URL.revokeObjectURL(url);
    await saveSetting("lastExport",new Date().toISOString());
    showToast("Exported! 💾");
  });

  document.getElementById("sett-import-btn").addEventListener("click",()=>document.getElementById("sett-file").click());
  document.getElementById("sett-file").addEventListener("change",async e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=async ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(d.backlog){STATE.backlog=d.backlog;await saveBacklog();}
        if(d.scheduled){STATE.scheduled=d.scheduled;await saveScheduled();}
        showToast("Imported!"); popModal(); render();
      }catch{showToast("Import failed","err");}
    };
    r.readAsText(f);
  });

  // Delete by date
  document.getElementById("del-by-date").addEventListener("click",async()=>{
    const dateVal=document.getElementById("del-date").value;
    if(!dateVal){showToast("Pick a date","err");return;}
    const before=dateVal;
    const origLen=STATE.scheduled.length;
    STATE.scheduled=STATE.scheduled.filter(t=>{
      if(!["Completed","Cancelled"].includes(t.status)) return true;
      const d=taskDate(t)||t.startDate||"";
      return !(d && d < before);
    });
    const deleted=origLen-STATE.scheduled.length;
    await saveScheduled();
    showToast(`${deleted} task(s) deleted`); popModal(); render();
  });

  // Delete by age (days)
  document.getElementById("del-by-days").addEventListener("click",async()=>{
    const daysVal=parseInt(document.getElementById("del-days").value);
    if(!daysVal||daysVal<1){showToast("Enter valid days","err");return;}
    const cutoff=addDays(localToday(),-daysVal);
    const origLen=STATE.scheduled.length;
    STATE.scheduled=STATE.scheduled.filter(t=>{
      if(!["Completed","Cancelled"].includes(t.status)) return true;
      const d=taskDate(t)||t.startDate||"";
      return !(d && d < cutoff);
    });
    const deleted=origLen-STATE.scheduled.length;
    await saveScheduled();
    showToast(`${deleted} task(s) deleted`); popModal(); render();
  });

  // Clear all scheduled
  document.getElementById("del-all-sched").addEventListener("click",async()=>{
    if(!confirm("Delete ALL scheduled tasks? This cannot be undone.")) return;
    STATE.scheduled=[];
    await saveScheduled(); showToast("All scheduled tasks cleared","err"); popModal(); render();
  });

  // Clear all backlog
  document.getElementById("del-all-backlog").addEventListener("click",async()=>{
    if(!confirm("Delete ALL backlog tasks? This cannot be undone.")) return;
    STATE.backlog=[];
    await saveBacklog(); showToast("All backlog tasks cleared","err"); popModal(); render();
  });
}

function openQuickCaptureModal(){
  const html=`<div class="modal" id="qc-modal">
    <div class="m-hdr"><h3 class="m-title">⚡ Quick Capture</h3><button class="close-btn" id="qc-close">✕</button></div>
    <input class="inp" id="qc-name" placeholder="What needs to be done?" style="font-size:16px"/>
    <label class="lbl">Priority</label>
    <div class="opt-row">${PRIORITIES.map(p=>`<button class="opt-btn" style="color:${PC[p]};border-color:${PC[p]}44" data-qc-prio="${p}">${p}</button>`).join("")}</div>
    <label class="lbl">Category</label>
    <div class="opt-row">${allCategories().map(c=>`<button class="opt-btn" data-qc-cat="${c}">${c}</button>`).join("")}</div>
    <div class="m-act" style="margin-top:16px">
      <button class="c-btn" id="qc-cancel">Cancel</button>
      <button class="o-btn" id="qc-full">Full Form</button>
      <button class="o-btn" id="qc-save" style="background:#059669">+ Add</button>
    </div>
  </div>`;
  pushModal(html,null);
  let qcPrio="Medium", qcCat="Work";
  const modal=document.getElementById("qc-modal");
  setTimeout(()=>modal.querySelector("#qc-name")?.focus(),100);
  modal.querySelector("#qc-close").addEventListener("click",popModal);
  modal.querySelector("#qc-cancel").addEventListener("click",popModal);
  modal.querySelectorAll("[data-qc-prio]").forEach(b=>b.addEventListener("click",()=>{
    qcPrio=b.dataset.qcPrio;
    modal.querySelectorAll("[data-qc-prio]").forEach(btn=>{btn.style.background=btn.dataset.qcPrio===qcPrio?`${PC[qcPrio]}33`:"";btn.style.fontWeight=btn.dataset.qcPrio===qcPrio?"700":"400";});
  }));
  modal.querySelectorAll("[data-qc-cat]").forEach(b=>b.addEventListener("click",()=>{
    qcCat=b.dataset.qcCat;
    modal.querySelectorAll("[data-qc-cat]").forEach(btn=>btn.classList.toggle("opt-on",btn.dataset.qcCat===qcCat));
  }));
  modal.querySelector("#qc-full").addEventListener("click",()=>{
    const name=modal.querySelector("#qc-name").value.trim();
    popModal();
    openTaskFormModal(name?{name,priority:qcPrio,category:qcCat,tags:[],important:false,urgent:false}:null);
  });
  modal.querySelector("#qc-save").addEventListener("click",async()=>{
    const name=modal.querySelector("#qc-name").value.trim();
    if(!name)return;
    STATE.backlog=[{id:gid(),name,priority:qcPrio,category:qcCat,tags:[],important:false,urgent:false,createdAt:new Date().toISOString()},...STATE.backlog];
    await saveBacklog();
    haptic(15);
    popModal();
    showToast("⚡ Captured!");
    render();
  });
  // Enter key saves
  modal.querySelector("#qc-name").addEventListener("keydown",ev=>{if(ev.key==="Enter")modal.querySelector("#qc-save").click();});
}

// ── Swipe gestures — iOS-style reveal ──
// Backlog: swipe left reveals Schedule/Edit/Delete; swipe right reveals Copy.
// Tap revealed button to trigger action. Tap card body to dismiss.
let _openSwipeId=null;

function closeAllSwipes(){
  document.querySelectorAll('.swipe-card').forEach(c=>{
    c.style.transition='transform .25s cubic-bezier(.25,.46,.45,.94)';
    c.style.transform='';
  });
  _openSwipeId=null;
}

function attachCardSwipes(allInst){
  const content=document.getElementById('content');
  if(STATE.tab==='backlog'&&!BL_STATE.bulk){
    document.querySelectorAll('.swipe-container').forEach(container=>{
      const id=container.dataset.blid;
      const card=container.querySelector('.swipe-card');
      const actR=container.querySelector('.swipe-actions-right');
      const actL=container.querySelector('.swipe-actions-left');
      if(!card||!id) return;
      const task=STATE.backlog.find(t=>t.id===id);
      if(!task) return;

      let startX=0,startY=0,dx=0,active=false,moved=false;

      card.addEventListener('touchstart',ev=>{
        startX=ev.touches[0].clientX; startY=ev.touches[0].clientY;
        dx=0; active=true; moved=false;
        if(_openSwipeId&&_openSwipeId!==id) closeAllSwipes();
      },{passive:true});

      card.addEventListener('touchmove',ev=>{
        if(!active) return;
        dx=ev.touches[0].clientX-startX;
        const dy=Math.abs(ev.touches[0].clientY-startY);
        if(dy>Math.abs(dx)+10){active=false;card.style.transform='';return;}
        if(Math.abs(dx)>6){
          moved=true;
          const actW=actR?actR.getBoundingClientRect().width||192:192;
          const actLW=actL?actL.getBoundingClientRect().width||64:64;
          const clamp=dx<0?Math.max(dx,-actW-10):Math.min(dx,actLW+10);
          card.style.transition='none';
          card.style.transform=`translateX(${clamp}px)`;
        }
      },{passive:true});

      card.addEventListener('touchend',()=>{
        if(!active) return; active=false;
        if(!moved){
          if(_openSwipeId===id){closeAllSwipes();return;}
          openTaskFormModal(task);
          return;
        }
        const actW=actR?actR.getBoundingClientRect().width||192:192;
        const actLW=actL?actL.getBoundingClientRect().width||64:64;
        card.style.transition='transform .25s cubic-bezier(.25,.46,.45,.94)';
        if(dx<-50){card.style.transform=`translateX(${-actW}px)`;_openSwipeId=id;haptic(12);}
        else if(dx>50){card.style.transform=`translateX(${actLW}px)`;_openSwipeId=id;haptic(12);}
        else{card.style.transform='';_openSwipeId=null;}
      });

      card.addEventListener('touchcancel',()=>{active=false;card.style.transform='';card.style.transition='';});

      // Action buttons
      container.querySelector('[data-bl-sched]')?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();openScheduleModal(task,false);
      });
      container.querySelector('[data-bl-edit]')?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();openTaskFormModal(task);
      });
      container.querySelector('[data-bl-del]')?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        openReasonModal(`Delete "${task.name}"?`,'Why are you deleting this task?','🗑️ Delete','#7f1d1d',async(reason)=>{
          const snap=[...STATE.backlog];
          STATE.backlog=STATE.backlog.filter(t=>t.id!==id);
          await saveBacklog(); haptic(15);
          showToast('Deleted','err',async()=>{STATE.backlog=snap;await saveBacklog();render();});
          render();
        });
      });
      container.querySelector('[data-bl-clone]')?.addEventListener('click',async e=>{
        e.stopPropagation();closeAllSwipes();
        STATE.backlog=[{...task,id:gid(),name:task.name+' (copy)',createdAt:new Date().toISOString()},...STATE.backlog];
        await saveBacklog();haptic(10);showToast('Duplicated ✓');render();
      });
    });

    // Bulk check bindings
    content.querySelectorAll('[data-bl-check]').forEach(el=>{
      el.addEventListener('click',()=>{
        const id=el.dataset.blCheck;
        if(BL_STATE.sel.has(id)) BL_STATE.sel.delete(id); else BL_STATE.sel.add(id);
        render();
      });
    });
  }

  // ── Shared swipe attach helper ──
  function addRevealSwipe(container, card, actR, actL, onTap){
    let startX=0,startY=0,dx=0,active=false,moved=false;
    const containerId=container.dataset.scSid||container.dataset.mxSid||container.dataset.kbSid||"";

    card.addEventListener('touchstart',ev=>{
      startX=ev.touches[0].clientX; startY=ev.touches[0].clientY;
      dx=0; active=true; moved=false;
      if(_openSwipeId&&_openSwipeId!==containerId) closeAllSwipes();
    },{passive:true});

    card.addEventListener('touchmove',ev=>{
      if(!active) return;
      dx=ev.touches[0].clientX-startX;
      const dy=Math.abs(ev.touches[0].clientY-startY);
      if(dy>Math.abs(dx)+10){active=false;card.style.transform='';return;}
      if(Math.abs(dx)>6){
        moved=true;
        const rw=actR?actR.getBoundingClientRect().width||128:0;
        const lw=actL?actL.getBoundingClientRect().width||64:0;
        const clamp=dx<0?Math.max(dx,-(rw+10)):Math.min(dx,lw+10);
        card.style.transition='none';
        card.style.transform=`translateX(${clamp}px)`;
      }
    },{passive:true});

    card.addEventListener('touchend',()=>{
      if(!active) return; active=false;
      if(!moved){
        if(_openSwipeId===containerId){closeAllSwipes();return;}
        if(onTap) onTap();
        return;
      }
      const rw=actR?actR.getBoundingClientRect().width||128:0;
      const lw=actL?actL.getBoundingClientRect().width||64:0;
      card.style.transition='transform .25s cubic-bezier(.25,.46,.45,.94)';
      if(dx<-50&&rw>0){card.style.transform=`translateX(${-rw}px)`;_openSwipeId=containerId;haptic(12);}
      else if(dx>50&&lw>0){card.style.transform=`translateX(${lw}px)`;_openSwipeId=containerId;haptic(12);}
      else{card.style.transform='';_openSwipeId=null;}
    });
    card.addEventListener('touchcancel',()=>{active=false;card.style.transform='';card.style.transition='';});
  }

  // ── Schedule tab swipe ──
  if(STATE.tab==='sched'){
    document.querySelectorAll('.sc-swipe-container').forEach(container=>{
      const sid=container.dataset.scSid;
      const task=allInst.find(t=>t.scheduledId===sid);
      if(!task) return;
      const card=container.querySelector('.swipe-card');
      const actR=container.querySelector('.swipe-actions-right');
      const actL=container.querySelector('.swipe-actions-left');
      if(!card) return;

      addRevealSwipe(container,card,actR,actL,()=>openTaskModal({...task,_masterId:getMasterId(task)}));

      // Action bindings
      container.querySelector(`[data-sc-complete="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        changeStatus(getMasterId(task),task.instanceDate,'Completed','');
      });
      container.querySelector(`[data-sc-hold="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        openReasonModal('Put On Hold','Why is this being put on hold?','⏸ Confirm Hold','#92400e',async reason=>{
          await changeStatus(getMasterId(task),task.instanceDate,'On Hold',reason);
        });
      });
      container.querySelector(`[data-sc-cancel="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        openCancelModal({...task,_masterId:getMasterId(task)});
      });
      container.querySelector(`[data-sc-reopen="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        changeStatus(getMasterId(task),task.instanceDate,'Not Started','');
      });
      container.querySelector(`[data-sc-detail="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        openTaskModal({...task,_masterId:getMasterId(task)});
      });
      container.querySelector(`[data-sc-resched="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        openScheduleModal(task,true);
      });
    });
  }

  // ── Matrix tab swipe ──
  if(STATE.tab==='matrix'){
    document.querySelectorAll('.mx-swipe-container').forEach(container=>{
      const sid=container.dataset.mxSid;
      const task=allInst.find(t=>t.scheduledId===sid);
      if(!task) return;
      const card=container.querySelector('.swipe-card');
      const actR=container.querySelector('.swipe-actions-right');
      const actL=container.querySelector('.swipe-actions-left');
      if(!card) return;

      addRevealSwipe(container,card,actR,actL,()=>openTaskModal({...task,_masterId:getMasterId(task)}));

      container.querySelector(`[data-mx-complete="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        changeStatus(getMasterId(task),task.instanceDate,'Completed','');
      });
      container.querySelector(`[data-mx-cancel="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        openCancelModal({...task,_masterId:getMasterId(task)});
      });
      container.querySelector(`[data-mx-detail="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        openTaskModal({...task,_masterId:getMasterId(task)});
      });
    });
  }

  // ── Kanban tab swipe ──
  if(STATE.tab==='kanban'){
    document.querySelectorAll('.kb-swipe-container').forEach(container=>{
      const sid=container.dataset.kbSid;
      const mid=container.dataset.kbMid;
      const idate=container.dataset.kbIdate||undefined;
      const task=allInst.find(t=>t.scheduledId===sid);
      if(!task) return;
      const card=container.querySelector('.swipe-card');
      const actR=container.querySelector('.swipe-actions-right');
      const actL=container.querySelector('.swipe-actions-left');
      if(!card) return;

      addRevealSwipe(container,card,actR,actL,()=>openTaskModal({...task,_masterId:getMasterId(task)}));

      container.querySelector(`[data-kb-sw-complete="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        changeStatus(mid,idate,'Completed','');
      });
      container.querySelector(`[data-kb-sw-inprog="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        changeStatus(mid,idate,'In Progress','');
      });
      container.querySelector(`[data-kb-sw-cancel="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        openCancelModal({...task,_masterId:mid,instanceDate:idate});
      });
      container.querySelector(`[data-kb-sw-detail="${sid}"]`)?.addEventListener('click',e=>{
        e.stopPropagation();closeAllSwipes();
        openTaskModal({...task,_masterId:getMasterId(task)});
      });
    });
  }
}


// ── Pull to refresh on Dashboard ──
(()=>{
  const content=document.getElementById("content");
  const ptr=document.getElementById("ptr-indicator");
  let ptStartY=0, ptPulling=false, ptTriggered=false;
  content.addEventListener("touchstart",ev=>{
    if(STATE.tab!=="dash"||content.scrollTop>0) return;
    ptStartY=ev.touches[0].clientY; ptPulling=true; ptTriggered=false;
  },{passive:true});
  content.addEventListener("touchmove",ev=>{
    if(!ptPulling) return;
    const dy=ev.touches[0].clientY-ptStartY;
    if(dy>10&&content.scrollTop===0){
      ptr.style.top=Math.min(dy*0.5-44,8)+"px";
      if(dy>80&&!ptTriggered){ptTriggered=true;haptic(15);}
    }
  },{passive:true});
  content.addEventListener("touchend",()=>{
    if(!ptPulling) return;
    ptPulling=false;
    ptr.style.top="-44px";
    if(ptTriggered){invalidateCache();render();showToast("🔄 Refreshed");}
  });
})();

// ─── PWA INSTALL PROMPT ───────────────────────────────────────────────────────
// Chrome fires beforeinstallprompt when PWA criteria are met (HTTPS + manifest + SW).
// We capture it and show our custom banner. For file:// access, we show manual steps.
let _deferredInstallPrompt=null;

window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();
  _deferredInstallPrompt=e;
});

window.addEventListener("appinstalled",()=>{
  _deferredInstallPrompt=null;
  showToast("FlowTask installed! 🎉");
});

// Show install guide in settings if accessed from file://
function openInstallGuideModal(){
  const isAndroid=/android/i.test(navigator.userAgent);
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  let steps="";
  if(isAndroid){
    steps=`<b>On Android (Chrome):</b><br>
    1. Tap the <b>⋮ menu</b> (3 dots) in Chrome's top-right corner<br>
    2. Tap <b>"Add to Home screen"</b><br>
    3. Tap <b>"Add"</b> to confirm<br><br>
    <b>Note:</b> For the install prompt to appear automatically, the file must be served over HTTPS. You can use a local server (e.g. VS Code Live Server) or host the file.`;
  } else if(isIOS){
    steps=`<b>On iOS (Safari):</b><br>
    1. Tap the <b>Share</b> button (box with arrow) at the bottom<br>
    2. Scroll down and tap <b>"Add to Home Screen"</b><br>
    3. Tap <b>"Add"</b> to confirm<br><br>
    <b>Note:</b> Must be opened in Safari, not Chrome.`;
  } else {
    steps=`<b>On Android Chrome:</b> Tap ⋮ menu → "Add to Home screen"<br><br>
    <b>On iOS Safari:</b> Tap Share → "Add to Home Screen"<br><br>
    <b>For automatic install prompt:</b> Serve this file via a local HTTPS server.`;
  }
  const html=`<div class="modal">
    <div class="m-hdr"><h3 class="m-title">📱 Install FlowTask</h3><button class="close-btn" id="ig-close">✕</button></div>
    <div class="ins-how">${steps}</div>
    <button class="o-btn" style="margin-top:14px;width:100%" id="ig-ok">Got it</button>
  </div>`;
  pushModal(html,null);
  document.getElementById("ig-close").addEventListener("click",popModal);
  document.getElementById("ig-ok").addEventListener("click",popModal);
}

// ─── REPORTS TAB ─────────────────────────────────────────────────────────────
function renderReports(allInst){
  const td=localToday();
  const todayDate=new Date(td+"T00:00:00");
  const dow=todayDate.getDay(), daysFromMon=(dow===0?6:dow-1);
  const weekStart=addDays(td,-daysFromMon);

  // Last 8 weeks data
  const weeks=Array.from({length:8},(_,i)=>{
    const wEnd=addDays(weekStart,-(i)*7);
    const wStart=addDays(wEnd,-6);
    const tasks=allInst.filter(t=>{
      const h=(t.statusHistory||[]).find(h=>h.status==="Completed");
      const d=h?h.at.split("T")[0]:null;
      return d&&d>=wStart&&d<=wEnd;
    });
    const planned=allInst.filter(t=>{const d=taskDate(t);return d&&d>=wStart&&d<=wEnd&&t.status!=="Cancelled";}).length;
    return{label:`W${8-i}`,completed:tasks.length,planned,rate:planned>0?Math.round((tasks.length/planned)*100):0};
  }).reverse();

  // Category breakdown this month
  const monthStart=td.slice(0,8)+"01";
  const monthTasks=allInst.filter(t=>taskDate(t)>=monthStart&&taskDate(t)<=td);
  const catBreak=allCategories().map(c=>({c,n:monthTasks.filter(t=>t.category===c).length})).filter(x=>x.n>0);
  const catTotal=catBreak.reduce((a,x)=>a+x.n,0);

  // Estimation accuracy: compare effort to actual time logged
  const withEffort=allInst.filter(t=>t.effort&&t.status==="Completed"&&totalSecondsLogged(t)>0);
  const effortMins={XS:15,S:30,M:60,L:120,XL:240};
  const estAcc=withEffort.map(t=>({name:t.name,effort:t.effort,planned:effortMins[t.effort]||60,actual:Math.round(totalSecondsLogged(t)/60)}));

  // Confetti on milestones
  const completedToday=allInst.filter(t=>{const h=(t.statusHistory||[]).find(x=>x.status==="Completed");return h&&h.at.split("T")[0]===td;}).length;
  const todayPending=allInst.filter(t=>taskDate(t)===td&&!["Completed","Cancelled"].includes(t.status)).length;
  const allDoneToday=completedToday>0&&todayPending===0;

  // Archive count (completed >30 days ago)
  const archiveCutoff=addDays(td,-30);
  const archivable=allInst.filter(t=>t.status==="Completed"&&taskDate(t)<archiveCutoff).length;

  const barMax=Math.max(...weeks.map(w=>w.completed),1);

  return `<div class="view">
  <div class="view-header"><h2 class="view-title">📊 Reports</h2></div>

  ${allDoneToday?`<div style="background:linear-gradient(135deg,#0d2818,#14532d);border:1px solid #059669;border-radius:12px;padding:16px;margin-bottom:12px;text-align:center">
    <div style="font-size:28px">🎉</div>
    <div style="color:#34d399;font-weight:700;font-size:15px;margin-top:4px">All done for today!</div>
    <div style="color:#475569;font-size:12px;margin-top:2px">Great work — ${completedToday} task${completedToday!==1?"s":""} completed</div>
  </div>`:""}

  <!-- Weekly completion bar chart -->
  <div class="d-sec" style="margin-bottom:12px">
    <div class="d-st">📈 Weekly Completion (Last 8 Weeks)</div>
    <div style="display:flex;gap:4px;align-items:flex-end;height:80px;margin-bottom:6px">
      ${weeks.map((w,i)=>`
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end">
          <div style="font-size:9px;color:${w.completed>0?"#34d399":"#334155"};font-weight:700">${w.completed||""}</div>
          <div style="width:100%;background:${i===7?"#3b82f6":w.completed>0?"#059669":"#1e293b"};border-radius:3px 3px 0 0;transition:height .3s;height:${w.completed>0?Math.max(6,Math.round((w.completed/barMax)*60)):4}px"></div>
          <div style="font-size:9px;color:${i===7?"#60a5fa":"#475569"}">${w.label}</div>
        </div>`).join("")}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-top:4px">
      <span>Avg: ${Math.round(weeks.reduce((a,w)=>a+w.completed,0)/weeks.length)} tasks/week</span>
      <span>Best: ${Math.max(...weeks.map(w=>w.completed))} tasks</span>
    </div>
  </div>

  <!-- Completion rate by week -->
  <div class="d-sec" style="margin-bottom:12px">
    <div class="d-st">✅ Completion Rate by Week</div>
    ${weeks.filter(w=>w.planned>0).map(w=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div style="width:28px;font-size:10px;color:#64748b">${w.label}</div>
      <div style="flex:1;background:#0f172a;border-radius:4px;height:7px;overflow:hidden">
        <div style="height:100%;width:${w.rate}%;background:${w.rate>=80?"#34d399":w.rate>=50?"#f59e0b":"#f87171"};border-radius:4px;transition:width .4s"></div>
      </div>
      <div style="font-size:10px;color:${w.rate>=80?"#34d399":w.rate>=50?"#f59e0b":"#f87171"};width:32px;text-align:right">${w.rate}%</div>
    </div>`).join("")}
    ${weeks.every(w=>w.planned===0)?`<div style="color:#334155;font-size:12px;text-align:center;padding:12px 0">No data yet</div>`:""}
  </div>

  <!-- Category breakdown this month -->
  <div class="d-sec" style="margin-bottom:12px">
    <div class="d-st">🗂️ This Month by Category</div>
    ${catBreak.length===0?`<div style="color:#334155;font-size:12px;text-align:center;padding:12px 0">No tasks this month</div>`:
    catBreak.map(({c,n})=>{const pct=catTotal>0?Math.round((n/catTotal)*100):0;return`
    <div style="margin-bottom:9px">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px">
        <span style="font-size:12px;color:#94a3b8">${c}</span>
        <span style="font-size:12px;color:${catColor(c)};font-weight:600">${n} (${pct}%)</span>
      </div>
      <div class="pb"><div class="pf" style="width:${pct}%;background:${catColor(c)}"></div></div>
    </div>`;}).join("")}
  </div>

  <!-- Estimation accuracy -->
  <div class="d-sec" style="margin-bottom:12px">
    <div class="d-st">🎯 Estimation Accuracy</div>
    ${estAcc.length===0?`<div style="font-size:12px;color:#334155;text-align:center;padding:12px 0">No completed tasks with effort + time logged yet</div>`:`
    <div style="display:grid;grid-template-columns:1fr 60px 60px 50px;gap:4px;margin-bottom:6px">
      <div style="font-size:10px;color:#475569;font-weight:600">Task</div>
      <div style="font-size:10px;color:#475569;font-weight:600;text-align:center">Est.</div>
      <div style="font-size:10px;color:#475569;font-weight:600;text-align:center">Actual</div>
      <div style="font-size:10px;color:#475569;font-weight:600;text-align:center">Δ</div>
    </div>
    ${estAcc.slice(0,8).map(({name,effort,planned,actual})=>{
      const delta=actual-planned;
      const pct=Math.round((actual/planned)*100);
      const col=pct<80?"#34d399":pct<=120?"#60a5fa":pct<=160?"#f59e0b":"#f87171";
      return`<div style="display:grid;grid-template-columns:1fr 60px 60px 50px;gap:4px;padding:5px 0;border-bottom:1px solid #0f172a;align-items:center">
        <div style="font-size:11px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(name)}</div>
        <div style="font-size:10px;color:#64748b;text-align:center">${effort} (${planned}m)</div>
        <div style="font-size:10px;color:${col};text-align:center;font-weight:600">${actual}m</div>
        <div style="font-size:10px;color:${delta>0?"#f87171":"#34d399"};text-align:center">${delta>0?"+":""}${delta}m</div>
      </div>`;}).join("")}
    <div style="font-size:10px;color:#475569;margin-top:8px">Avg accuracy: ${Math.round(estAcc.reduce((a,x)=>a+(x.actual/x.planned)*100,0)/estAcc.length)}% of estimate</div>`}
  </div>

  <!-- Archive suggestion -->
  ${archivable>0?`<div class="d-sec" style="margin-bottom:12px;border-left:3px solid #3b82f6">
    <div class="d-st">🗄️ Archive Old Tasks</div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:10px">${archivable} completed tasks are older than 30 days and can be archived to keep the app fast.</div>
    <button class="o-btn" style="width:100%" id="rpt-archive">🗄️ Archive ${archivable} Old Tasks</button>
  </div>`:""}

  <!-- Export CSV -->
  <div class="d-sec" style="margin-bottom:12px">
    <div class="d-st">💾 Export Data</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="sm-btn" style="flex:1" id="rpt-export-json">📦 JSON</button>
      <button class="sm-btn" style="flex:1" id="rpt-export-csv">📊 CSV</button>
    </div>
    <div style="font-size:10px;color:#334155;margin-top:6px">CSV exports all scheduled tasks with status, dates, and time logged.</div>
  </div>

  <!-- Focus / Pomodoro timer -->
  <div class="d-sec" style="margin-bottom:32px">
    <div class="d-st">🍅 Focus Timer</div>
    <div id="pomodoro-display" style="text-align:center;padding:12px 0">
      <div id="pom-time" style="font-size:40px;font-weight:800;color:#60a5fa;font-variant-numeric:tabular-nums">${window._pomState?fmtTimer(window._pomState.remaining):"25:00"}</div>
      <div id="pom-label" style="font-size:11px;color:#475569;margin-top:4px">${window._pomState?window._pomState.label:"Ready to focus"}</div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:10px">
      <button class="sm-btn pom-dur" data-pom-mins="25" style="${(!window._pomState||window._pomState.mins===25)?"background:#1e3a5f;border-color:#3b82f6;color:#60a5fa":""}">25m</button>
      <button class="sm-btn pom-dur" data-pom-mins="50" style="${window._pomState?.mins===50?"background:#1e3a5f;border-color:#3b82f6;color:#60a5fa":""}">50m</button>
      <button class="sm-btn pom-dur" data-pom-mins="5" style="${window._pomState?.mins===5?"background:#1e3a5f;border-color:#3b82f6;color:#60a5fa":""}">5m break</button>
    </div>
    <div style="display:flex;gap:8px">
      <button class="o-btn" style="flex:1" id="pom-start">${window._pomState?.running?"⏸ Pause":"▶ Start"}</button>
      <button class="sm-btn" style="flex:none" id="pom-reset">↺ Reset</button>
    </div>
  </div>
</div>`;
}

// ─── POMODORO TIMER STATE ─────────────────────────────────────────────────────
window._pomState=window._pomState||{mins:25,remaining:25*60,running:false,label:"Ready to focus",interval:null};
function pomTick(){
  const p=window._pomState;
  if(!p.running) return;
  p.remaining--;
  if(p.remaining<=0){
    p.running=false; clearInterval(p.interval); p.interval=null;
    haptic(200);
    p.label="✅ Done! Take a break.";
    if(STATE.notifOk) try{new Notification("🍅 FlowTask",{body:"Focus session complete! Time for a break."});}catch{}
    showToast("🍅 Focus session complete!");
  }
  // Update display if on reports tab without full re-render
  const el=document.getElementById("pom-time");
  const lbl=document.getElementById("pom-label");
  if(el) el.textContent=fmtTimer(p.remaining);
  if(lbl) lbl.textContent=p.label;
  const startBtn=document.getElementById("pom-start");
  if(startBtn) startBtn.textContent=p.running?"⏸ Pause":"▶ Start";
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
function triggerConfetti(){
  const colors=["#60a5fa","#34d399","#f59e0b","#f87171","#a78bfa","#fb923c"];
  const container=document.getElementById("content");
  if(!container) return;
  for(let i=0;i<40;i++){
    const el=document.createElement("div");
    const color=colors[i%colors.length];
    const x=Math.random()*100, delay=Math.random()*1200, dur=1000+Math.random()*1000;
    el.style.cssText=`position:fixed;top:-10px;left:${x}%;width:8px;height:8px;background:${color};border-radius:${Math.random()>0.5?"50%":"2px"};z-index:9999;pointer-events:none;animation:confetti-fall ${dur}ms ease-in ${delay}ms forwards;opacity:1`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), delay+dur+100);
  }
}
// Add confetti keyframe if not present
if(!document.getElementById("confetti-style")){
  const s=document.createElement("style");
  s.id="confetti-style";
  s.textContent="@keyframes confetti-fall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}";
  document.head.appendChild(s);
}

// ─── REPORTS BINDINGS ─────────────────────────────────────────────────────────
function bindReports(allInst){
  // Archive old tasks
  const archiveBtn=document.getElementById("rpt-archive");
  if(archiveBtn) archiveBtn.addEventListener("click",async()=>{
    const cutoff=addDays(localToday(),-30);
    const before=STATE.scheduled.length;
    STATE.scheduled=STATE.scheduled.filter(t=>!(t.status==="Completed"&&taskDate(t)<cutoff));
    const del=before-STATE.scheduled.length;
    invalidateCache(); await saveScheduled();
    showToast(`🗄️ ${del} tasks archived`); render();
  });

  // Export JSON
  const jsonBtn=document.getElementById("rpt-export-json");
  if(jsonBtn) jsonBtn.addEventListener("click",()=>{
    const blob=new Blob([JSON.stringify({backlog:STATE.backlog,scheduled:STATE.scheduled,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`flowtask-${localToday()}.json`;a.click();
    showToast("📦 JSON exported");
  });

  // Export CSV
  const csvBtn=document.getElementById("rpt-export-csv");
  if(csvBtn) csvBtn.addEventListener("click",()=>{
    const rows=[["Name","Status","Category","Priority","Effort","Date","Time Logged (min)","Tags"]];
    allInst.forEach(t=>{
      rows.push([
        `"${(t.name||"").replace(/"/g,'""')}"`,
        t.status||"",t.category||"",t.priority||"",t.effort||"",
        taskDate(t)||"",
        Math.round(totalSecondsLogged(t)/60),
        `"${(t.tags||[]).join(",")}"`
      ]);
    });
    const csv=rows.map(r=>r.join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`flowtask-${localToday()}.csv`;a.click();
    showToast("📊 CSV exported");
  });

  // Pomodoro
  document.querySelectorAll(".pom-dur").forEach(b=>b.addEventListener("click",()=>{
    const mins=parseInt(b.dataset.pomMins);
    const p=window._pomState;
    clearInterval(p.interval); p.interval=null;
    p.mins=mins; p.remaining=mins*60; p.running=false;
    p.label=mins<=10?"Break timer ready":"Focus timer ready";
    render();
  }));
  const pomStart=document.getElementById("pom-start");
  if(pomStart) pomStart.addEventListener("click",()=>{
    const p=window._pomState;
    if(p.running){
      p.running=false; clearInterval(p.interval); p.interval=null;
      p.label="Paused";
    } else {
      if(p.remaining<=0){p.remaining=p.mins*60;}
      p.running=true; p.label="Focusing…";
      p.interval=setInterval(pomTick,1000);
    }
    render();
  });
  const pomReset=document.getElementById("pom-reset");
  if(pomReset) pomReset.addEventListener("click",()=>{
    const p=window._pomState;
    clearInterval(p.interval); p.interval=null;
    p.running=false; p.remaining=p.mins*60; p.label="Ready to focus";
    render();
  });

  // Confetti if all done today
  const td=localToday();
  const completedToday=allInst.filter(t=>{const h=(t.statusHistory||[]).find(x=>x.status==="Completed");return h&&h.at.split("T")[0]===td;}).length;
  const pendingToday=allInst.filter(t=>taskDate(t)===td&&!["Completed","Cancelled"].includes(t.status)).length;
  if(completedToday>0&&pendingToday===0) setTimeout(triggerConfetti,300);
}

// Confetti also triggers when completing last task of day from any tab
const _origChangeStatus=changeStatus;
async function changeStatus(masterSId,iDate,newS,reason=""){
  await _origChangeStatus(masterSId,iDate,newS,reason);
  if(newS==="Completed"){
    const td=localToday();
    const inst=getAllInst();
    const pendingToday=inst.filter(t=>taskDate(t)===td&&!["Completed","Cancelled"].includes(t.status)).length;
    const doneToday=inst.filter(t=>{const h=(t.statusHistory||[]).find(x=>x.status==="Completed");return h&&h.at.split("T")[0]===td;}).length;
    if(pendingToday===0&&doneToday>0) triggerConfetti();
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async()=>{
  await openDB();
  await loadState();
  render();
  // Auto-backup reminder check (after state is loaded)
  if(STATE.lastExport){
    const daysSince=Math.floor((Date.now()-new Date(STATE.lastExport).getTime())/(1000*60*60*24));
    if(daysSince>=30) setTimeout(()=>showToast(`📦 Last backup ${daysSince} days ago — export in Settings`),4000);
  }
})();
</script>
