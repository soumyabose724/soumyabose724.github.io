<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArthaGrid — Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    /* No demo-bar on this page — anchor the fixed top-bar to the true top */
    :root { --demo-bar-h: 0px; }

    /* Search input lives inside the top bar */
    .search-input-wrap { flex: 1; position: relative; }
    .search-input {
      width: 100%; height: 40px; border-radius: var(--r-full);
      background: var(--surface-raised); border: 1.5px solid var(--border);
      padding: 0 38px 0 var(--sp-4); font-size: 14.5px; color: var(--text-primary);
      transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
    }
    .search-input::placeholder { color: var(--text-muted); }
    .search-input:focus { outline: none; border-color: var(--primary); box-shadow: var(--ring); }
    .search-clear {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      width: 28px; height: 28px; border-radius: 50%;
      display: none; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 13px;
      transition: background var(--dur-fast);
    }
    .search-clear:hover { background: var(--border); color: var(--text-primary); }
    .search-clear.visible { display: flex; }

    /* Filter chips */
    .filter-strip {
      display: flex; gap: var(--sp-2); overflow-x: auto;
      padding: var(--sp-1) 0 var(--sp-3); scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .filter-strip::-webkit-scrollbar { display: none; }
    .filter-chip {
      height: 32px; padding: 0 var(--sp-4); border-radius: var(--r-full); flex-shrink: 0;
      background: var(--surface); border: 1.5px solid var(--border);
      font-size: 12.5px; font-weight: 600; color: var(--text-secondary);
      cursor: pointer; white-space: nowrap;
      transition: background var(--dur-fast), color var(--dur-fast), border-color var(--dur-fast);
    }
    .filter-chip:hover { border-color: var(--primary); color: var(--primary); }
    .filter-chip.selected { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* Result group + rows */
    .result-group { margin-bottom: var(--sp-4); }
    .result-group__title {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted);
      padding: var(--sp-2) var(--sp-1);
      display: flex; align-items: center; gap: var(--sp-2);
    }
    .result-group__count {
      background: var(--surface-raised); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 10px; font-weight: 700;
      padding: 0 7px; border-radius: var(--r-full);
    }
    .result-row {
      display: flex; align-items: center; gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-3);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); margin-bottom: var(--sp-2);
      text-decoration: none; color: inherit;
      transition: background var(--dur-fast), box-shadow var(--dur-fast);
      animation: item-in var(--dur-med) var(--ease-out) both;
    }
    .result-row:hover { background: var(--primary-xlight); box-shadow: var(--sh-sm); }
    .result-row__icon {
      width: 38px; height: 38px; border-radius: var(--r-md); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; color: #fff;
    }
    .result-row__body { flex: 1; min-width: 0; }
    .result-row__title {
      font-size: 14px; font-weight: 600; color: var(--text-primary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .result-row__title mark {
      background: var(--primary-light); color: var(--primary);
      border-radius: 3px; padding: 0 1px;
    }
    .result-row__meta { font-size: 12px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-row__amount {
      font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
      font-size: 13.5px; font-weight: 600; flex-shrink: 0;
    }

    /* Recent chips (pre-search state) */
    .recent-title {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--sp-3);
    }
    .recent-chips { display: flex; flex-wrap: wrap; gap: var(--sp-2); margin-bottom: var(--sp-6); }
    .recent-chip {
      display: inline-flex; align-items: center; gap: 6px;
      height: 34px; padding: 0 var(--sp-4); border-radius: var(--r-full);
      background: var(--surface); border: 1.5px solid var(--border);
      font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer;
      transition: border-color var(--dur-fast), color var(--dur-fast);
    }
    .recent-chip:hover { border-color: var(--primary); color: var(--primary); }
    .recent-chip svg { color: var(--text-muted); }
  </style>
</head>

  const GROUP_LABEL = { txn:'Transactions', envelope:'Envelopes', invest:'Investments', account:'Accounts, Cards & Loans', other:'Policies, Goals & Screens' };
  const GROUP_ORDER = ['txn', 'envelope', 'invest', 'account', 'other'];

  let activeCat = 'all';
  const qEl = document.getElementById('q');
  const clearEl = document.getElementById('q-clear');

  function esc(s) { return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function highlight(text, q) {
    const idx = text.toLowerCase().indexOf(q.toLowerCase());
    if (idx < 0) return esc(text);
    return esc(text.slice(0, idx)) + '<mark>' + esc(text.slice(idx, idx + q.length)) + '</mark>' + esc(text.slice(idx + q.length));
  }

  function rowHtml(item, q) {
    const grad = item.cat === 'txn' ? (item.pos ? GRAD.income : GRAD.expense) : GRAD[item.cat];
    const icon = ICONS[item.cat] || ICONS.other;
    const amtColor = item.pos ? 'var(--success)' : (item.cat === 'txn' ? 'var(--error)' : 'var(--text-primary)');
    return `
      <a class="result-row" href="${item.href}">
        <div class="result-row__icon" style="background:${grad};">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${icon}</svg>
        </div>
        <div class="result-row__body">
          <div class="result-row__title">${highlight(item.title, q)}</div>
          <div class="result-row__meta">${esc(item.meta)}</div>
        </div>
        ${item.amount ? `<span class="result-row__amount" style="color:${amtColor};">${item.amount}</span>` : ''}
      </a>`;
  }

  function search() {
    const q = qEl.value.trim();
    clearEl.classList.toggle('visible', q.length > 0);
    const idle = document.getElementById('view-idle');
    const results = document.getElementById('view-results');
    if (!q) { idle.style.display = ''; results.style.display = 'none'; return; }
    idle.style.display = 'none'; results.style.display = '';

    const matches = INDEX.filter(it =>
      (activeCat === 'all' || it.cat === activeCat) &&
      (it.title.toLowerCase().includes(q.toLowerCase()) || it.meta.toLowerCase().includes(q.toLowerCase()))
    );

    const out = document.getElementById('results');
    const noRes = document.getElementById('no-results');
    if (!matches.length) { out.innerHTML = ''; noRes.style.display = ''; return; }
    noRes.style.display = 'none';

    let html = '';
    for (const cat of GROUP_ORDER) {
      const group = matches.filter(m => m.cat === cat);
      if (!group.length) continue;
      html += `<div class="result-group">
        <div class="result-group__title">${GROUP_LABEL[cat]} <span class="result-group__count">${group.length}</span></div>
        ${group.slice(0, 6).map(m => rowHtml(m, q)).join('')}
      </div>`;
    }
    out.innerHTML = html;
  }

  qEl.addEventListener('input', search);
  clearEl.addEventListener('click', () => { qEl.value = ''; search(); qEl.focus(); });

  document.querySelectorAll('.recent-chip').forEach(chip => {
    chip.addEventListener('click', () => { qEl.value = chip.dataset.q; search(); qEl.focus(); });
  });

  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('selected'));
      chip.classList.add('selected');
      activeCat = chip.dataset.cat;
      search();
    });
  });

  // Support ?q= deep links and autofocus
  const urlQ = new URLSearchParams(location.search).get('q');
  if (urlQ) { qEl.value = urlQ; search(); }
  setTimeout(() => qEl.focus(), 300);
</script>
</body>
</html>
