<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArthaGrid — Burn Rate · Jun 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    /* ── Page content ── */
    .page-content--burn {
      padding: 0;
      padding-top: calc(var(--top-bar-h) + 68px + var(--sp-4));
      padding-bottom: calc(var(--bottom-nav-h) + var(--sp-10));
      overflow-y: auto;
    }

    /* ── Summary strip (fixed below top bar) ── */
    .summary-strip {
      position: fixed;
      top: calc(var(--demo-bar-h) + var(--top-bar-h));
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: var(--page-max);
      background: var(--surface-raised);
      border-bottom: 1px solid var(--border);
      padding: var(--sp-3) var(--sp-4);
      z-index: 45;
      display: flex; align-items: center; gap: var(--sp-4);
      flex-wrap: wrap;
      transition: background var(--dur-base) var(--ease-out),
                  border-color var(--dur-base) var(--ease-out);
    }
    .summary-strip__item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--text-secondary);
    }
    .summary-strip__item strong {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-weight: 600; color: var(--text-primary);
      font-size: 12px;
    }
    .summary-strip__dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: var(--border-strong); flex-shrink: 0;
    }

    /* ── Warning banner ── */
    .warning-banner {
      display: none;
      align-items: center; gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--r-lg);
      font-size: 13px; font-weight: 500;
      margin: 0 var(--sp-4) var(--sp-3);
      animation: card-in var(--dur-med) var(--ease-out) both;
    }
    .warning-banner.visible { display: flex; }
    .warning-banner--amber {
      background: var(--warning-light);
      border: 1px solid rgba(245,158,11,.28);
      color: #92400E;
    }
    [data-theme="dark"] .warning-banner--amber { color: var(--warning); }
    .warning-banner--red {
      background: var(--error-light);
      border: 1px solid rgba(233,69,96,.28);
      color: var(--error);
    }
    .warning-banner__icon { font-size: 18px; flex-shrink: 0; }

    /* ── Section heading with accent bar ── */
    .section-heading {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted);
      padding: var(--sp-5) var(--sp-4) var(--sp-3);
      display: flex; align-items: center; gap: var(--sp-2);
    }
    .section-heading::before {
      content: ''; width: 3px; height: 12px; border-radius: 2px;
      background: var(--primary); flex-shrink: 0;
    }

    /* ── Chart card ── */
    .chart-card {
      margin: 0 var(--sp-4) var(--sp-2);
      background: var(--glass-fill);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--r-xl);
      box-shadow: var(--glass-shadow);
      padding: var(--sp-4) var(--sp-3) var(--sp-3);
      animation: card-in var(--dur-med) var(--ease-out) both;
    }
    .chart-card svg {
      width: 100%;
      display: block;
    }

    /* ── Chart legend ── */
    .chart-legend {
      display: flex; align-items: center; gap: var(--sp-4);
      padding: var(--sp-3) var(--sp-1) 0;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-secondary); font-weight: 500;
    }
    .legend-swatch {
      width: 22px; height: 3px; border-radius: 2px; flex-shrink: 0;
    }
    .legend-swatch--actual  { background: var(--primary); }
    .legend-swatch--ceiling {
      background: var(--border-strong);
      background-image: repeating-linear-gradient(
        90deg, var(--border-strong) 0 4px, transparent 4px 7px
      );
    }
    .legend-swatch--expected {
      background: var(--text-muted);
      background-image: repeating-linear-gradient(
        90deg, var(--text-muted) 0 4px, transparent 4px 7px
      );
    }

    /* ── Envelope breakdown list ── */
    .env-table-card {
      margin: 0 var(--sp-4) var(--sp-4);
      background: var(--glass-fill);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--r-xl);
      box-shadow: var(--glass-shadow);
      overflow: hidden;
      animation: card-in var(--dur-med) var(--ease-out) 60ms both;
    }

    /* Row: two stacked lines — name + status chip, then spend + burn% */
    .env-table-row {
      display: flex; flex-direction: column; gap: 6px;
      padding: var(--sp-3) var(--sp-4);
      border-bottom: 1px solid var(--border);
      transition: background var(--dur-fast);
    }
    .env-table-row:last-child { border-bottom: none; }
    .env-table-row:hover { background: var(--primary-xlight); }
    .env-table-row--over { background: rgba(233,69,96,.03); }
    .env-table-row--over:hover { background: rgba(233,69,96,.07); }

    .env-table-row__top {
      display: flex; align-items: center; gap: var(--sp-2);
    }
    .env-table-row__name {
      flex: 1; min-width: 0;
      display: flex; align-items: center; gap: var(--sp-2);
      font-size: 13px; font-weight: 600; color: var(--text-primary);
    }
    .env-table-row__emoji { font-size: 16px; flex-shrink: 0; }
    .env-table-row__label { font-size: 13px; }
    .env-table-row__bottom {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: var(--sp-3);
      font-size: 12px; color: var(--text-secondary);
    }
    .env-table-row__budget {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 12px; font-weight: 500;
      color: var(--text-muted);
    }
    .env-table-row__spent {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 12px; font-weight: 600;
      color: var(--text-primary);
    }
    .env-table-row__spent--over { color: var(--error); }
    .env-table-row__pct {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
    }
    .env-table-row__status { flex-shrink: 0; }
    .env-table-row .chip {
      font-size: 10px; height: 20px; padding: 0 6px;
    }

    /* ── Today marker tooltip style ── */
    .chart-today-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; font-weight: 700;
      fill: var(--primary);
    }

    /* ── Y-axis / X-axis label style ── */
    .chart-axis-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      fill: var(--text-muted);
    }
  </style>
</head>

<script>
/* ─────────────────────────────────────────────
   THEME TOGGLE
───────────────────────────────────────────── */
(function () {
  const stored = localStorage.getItem('ag-theme');
  if (stored) document.documentElement.setAttribute('data-theme', stored);

  function syncIcons() {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    const icon = cur === 'dark' ? '☀️' : '🌙';
    document.getElementById('theme-icon').textContent = icon;
    document.querySelectorAll('[data-theme-icon]').forEach(el => el.textContent = icon);
  }
  syncIcons();

  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('ag-theme', next);
    syncIcons();
  }

  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
  document.querySelectorAll('[data-theme-toggle]').forEach(btn =>
    btn.addEventListener('click', toggleTheme)
  );
})();

/* ─────────────────────────────────────────────
   TOAST
───────────────────────────────────────────── */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(6px)';
  }, 2800);
}

/* ─────────────────────────────────────────────
   CHART HELPERS
   Chart area: x from 30 to 290 (260px wide), y from 10 to 140 (130px tall)
   X: day d (1–30) → x = 30 + (d-1)/29 * 260
   Y: amount (0–120000) → y = 140 - (amount/120000) * 130
───────────────────────────────────────────── */
const CHART_X_MIN = 30, CHART_X_MAX = 290;
const CHART_Y_MIN = 10, CHART_Y_MAX = 140;
const BUDGET = 120000;
const DAYS_TOTAL = 30;
const DAYS_ELAPSED = 14;

function dayToX(d) {
  return CHART_X_MIN + ((d - 1) / (DAYS_TOTAL - 1)) * (CHART_X_MAX - CHART_X_MIN);
}
function amtToY(amount) {
  const clamped = Math.min(amount, BUDGET * 1.1); // allow slight overshoot
  return CHART_Y_MAX - (clamped / BUDGET) * (CHART_Y_MAX - CHART_Y_MIN);
}

    // Steeper curve — day 14: 85200

/* ─────────────────────────────────────────────
   DRAW CHART
───────────────────────────────────────────── */
function drawChart(key) {
  const s = STATES[key];
  const dailySpend = s.dailySpend;

  // Build polyline points for actual spend (days 1 to 14)
  const pts = dailySpend.map((amt, i) => {
    const day = i + 1;
    const x = dayToX(day);
    const y = amtToY(amt);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });

  const line = document.getElementById('actual-line');
  line.setAttribute('points', pts.join(' '));

  // Move dot to last actual point
  const lastAmt = dailySpend[dailySpend.length - 1];
  const lastX = dayToX(DAYS_ELAPSED);
  const lastY = amtToY(lastAmt);
  const dot = document.getElementById('actual-dot');
  dot.setAttribute('cx', lastX.toFixed(1));
  dot.setAttribute('cy', lastY.toFixed(1));

  // Color the actual line based on state
  if (key === 'overspent') {
    line.setAttribute('stroke', 'var(--error)');
    dot.setAttribute('fill', 'var(--error)');
  } else if (key === 'ahead') {
    line.setAttribute('stroke', 'var(--warning)');
    dot.setAttribute('fill', 'var(--warning)');
  } else {
    line.setAttribute('stroke', 'var(--primary)');
    dot.setAttribute('fill', 'var(--primary)');
  }
}

/* ─────────────────────────────────────────────
   RENDER ENVELOPE TABLE
───────────────────────────────────────────── */
function renderTable(key) {
  const s = STATES[key];
  const body = document.getElementById('env-table-body');
  body.innerHTML = '';

  s.envelopes.forEach(env => {
    const row = document.createElement('div');
    row.className = 'env-table-row' + (env.over ? ' env-table-row--over' : '');

    // Burn% colour
    let pctColor = 'var(--text-secondary)';
    if (env.pctRaw >= 100) pctColor = 'var(--error)';
    else if (env.pctRaw >= 85) pctColor = 'var(--warning)';
    else if (env.pctRaw >= 50) pctColor = 'var(--primary)';

    const spentClass = env.over ? 'env-table-row__spent env-table-row__spent--over' : 'env-table-row__spent';

    row.innerHTML = `
      <div class="env-table-row__top">
        <div class="env-table-row__name">
          <span class="env-table-row__emoji">${env.emoji}</span>
          <span class="env-table-row__label">${env.name}</span>
        </div>
        <div class="env-table-row__status">
          <span class="chip ${env.chipCls}">${env.chipTxt}</span>
        </div>
      </div>
      <div class="env-table-row__bottom">
        <span><span class="${spentClass}">${env.spent}</span> <span class="env-table-row__budget">of ${env.budget} spent</span></span>
        <span class="env-table-row__pct" style="color:${pctColor};">${env.pct} burn</span>
      </div>
    `;
    body.appendChild(row);
  });
}

/* ─────────────────────────────────────────────
   APPLY STATE
───────────────────────────────────────────── */
function applyState(key) {
  const s = STATES[key];

  // Summary strip
  document.getElementById('strip-spent-label').textContent = s.stripSpent;
  document.getElementById('strip-spent-pct').textContent   = s.stripPct;

  // Warning banners
  const bannerAmber = document.getElementById('warning-amber');
  const bannerRed   = document.getElementById('warning-red');
  bannerAmber.classList.toggle('visible', s.warning === 'amber');
  bannerRed.classList.toggle('visible',   s.warning === 'red');

  // Chart
  drawChart(key);

  // Table
  renderTable(key);
}

/* ─────────────────────────────────────────────
   DEMO BAR WIRING
───────────────────────────────────────────── */
document.querySelectorAll('.demo-btn[data-state]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.demo-btn[data-state]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyState(btn.dataset.state);
    toast('State: ' + btn.textContent.trim());
  });
});

   INITIAL RENDER
