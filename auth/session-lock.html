<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArthaGrid — Session Lock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    /* Full-screen lock overlay — layered on top of a blurred app */
    .lock-bg {
      position: fixed;
      inset: 0;
      /* Simulate blurred app behind lock screen */
      background:
        linear-gradient(135deg,
          rgba(13,148,136,0.15) 0%,
          rgba(26,24,22,0.0) 60%
        ),
        var(--bg);
      z-index: 0;
    }
    /* Fake blurred app content behind */
    .lock-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent 0px,
          transparent 40px,
          var(--border) 40px,
          var(--border) 41px
        ),
        repeating-linear-gradient(
          90deg,
          transparent 0px,
          transparent 120px,
          var(--border) 120px,
          var(--border) 121px
        );
      opacity: 0.15;
    }

    .lock-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      z-index: 10;
      backdrop-filter: blur(24px) saturate(0.8);
      -webkit-backdrop-filter: blur(24px) saturate(0.8);
      background: rgba(26,24,22,0.72);
      padding: 0;
    }
    [data-theme="light"] .lock-screen {
      background: rgba(250,248,244,0.88);
      backdrop-filter: blur(24px) saturate(1.1);
      -webkit-backdrop-filter: blur(24px) saturate(1.1);
    }

    /* Demo bar sits above the lock overlay */
    .demo-bar {
      position: fixed;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: var(--page-max);
      z-index: var(--z-demo);
    }

    /* Top section: logo + greeting */
    .lock-top {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: calc(var(--demo-bar-h) + 40px);
      gap: var(--sp-3);
      animation: card-in 0.4s var(--ease-out) both;
    }
    .lock-logo {
      width: 52px;
      height: 52px;
      border-radius: var(--r-xl);
      background: var(--grad-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      box-shadow: 0 8px 24px rgba(13,148,136,0.36);
      margin-bottom: var(--sp-2);
    }
    .lock-greeting {
      font-size: 26px;
      font-weight: 700;
      color: #F5F1EC;
      letter-spacing: -0.01em;
      text-align: center;
    }
    [data-theme="light"] .lock-greeting { color: var(--text-primary); }

    .lock-idle-text {
      font-size: 13px;
      color: rgba(245,241,236,0.55);
      text-align: center;
    }
    [data-theme="light"] .lock-idle-text { color: var(--text-muted); }

    /* Middle: PIN entry */
    .lock-mid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-5);
      width: 100%;
      padding: 0 var(--sp-6);
      animation: card-in 0.4s var(--ease-out) 0.1s both;
    }

    /* PIN label */
    .lock-pin-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(245,241,236,0.55);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    [data-theme="light"] .lock-pin-label { color: var(--text-muted); }

    /* PIN row — override for dark lock screen */
    .lock-pin-row {
      display: flex;
      gap: var(--sp-3);
      justify-content: center;
    }
    .lock-pin-box {
      width: 50px;
      height: 62px;
      border-radius: var(--r-lg);
      border: 2px solid rgba(245,241,236,0.20);
      background: rgba(245,241,236,0.06);
      text-align: center;
      font-size: 26px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: #F5F1EC;
      caret-color: var(--primary);
      transition: border-color var(--dur-fast), box-shadow var(--dur-fast),
                  transform var(--dur-fast) var(--ease-spring),
                  background var(--dur-fast);
    }
    [data-theme="light"] .lock-pin-box {
      border-color: var(--border-strong);
      background: var(--surface);
      color: var(--text-primary);
    }
    .lock-pin-box:focus {
      border-color: var(--primary);
      box-shadow: var(--ring);
      outline: none;
      transform: scale(1.06);
      background: rgba(13,148,136,0.12);
    }
    [data-theme="light"] .lock-pin-box:focus {
      background: var(--primary-xlight);
    }
    .lock-pin-box.filled {
      border-color: var(--primary);
      background: rgba(13,148,136,0.16);
    }
    [data-theme="light"] .lock-pin-box.filled {
      background: var(--primary-xlight);
    }
    .lock-pin-box.error {
      border-color: var(--error);
      box-shadow: var(--ring-danger);
      animation: shake 0.35s var(--ease-sym);
    }

    /* Error text */
    .lock-error-text {
      display: none;
      font-size: 13px;
      color: var(--error);
      font-weight: 500;
      text-align: center;
      padding: var(--sp-2) var(--sp-4);
      background: rgba(233,69,96,0.12);
      border: 1px solid rgba(233,69,96,0.25);
      border-radius: var(--r-lg);
      width: 100%;
      animation: card-in var(--dur-base) var(--ease-out) both;
    }
    .lock-error-text.visible { display: block; }

    /* Unlock button */
    .lock-unlock-btn {
      width: 100%;
      height: 52px;
      border-radius: var(--r-xl);
      background: var(--grad-primary);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(13,148,136,0.36);
      transition: box-shadow var(--dur-fast), transform var(--dur-fast) var(--ease-spring);
    }
    .lock-unlock-btn:hover { box-shadow: 0 6px 24px rgba(13,148,136,0.48); }
    .lock-unlock-btn:active { transform: scale(0.97); }

    /* Biometric ghost button */
    .lock-biometric-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      width: 100%;
      height: 48px;
      border: 1.5px solid rgba(245,241,236,0.20);
      border-radius: var(--r-xl);
      background: rgba(245,241,236,0.06);
      color: rgba(245,241,236,0.70);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--dur-fast), border-color var(--dur-fast), color var(--dur-fast);
    }
    [data-theme="light"] .lock-biometric-btn {
      border-color: var(--border-strong);
      background: var(--surface);
      color: var(--text-secondary);
    }
    .lock-biometric-btn:hover {
      background: rgba(13,148,136,0.12);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Bottom section */
    .lock-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-3);
      padding-bottom: 48px;
      animation: card-in 0.4s var(--ease-out) 0.2s both;
    }
    .lock-switch-account {
      font-size: 12px;
      color: rgba(245,241,236,0.35);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      transition: color var(--dur-fast);
    }
    [data-theme="light"] .lock-switch-account { color: var(--text-muted); }
    .lock-switch-account:hover { color: rgba(245,241,236,0.65); }

    /* Biometric authenticating overlay */
    .biometric-auth-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: calc(var(--z-modal) + 10);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur-med) var(--ease-out);
    }
    .biometric-auth-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .biometric-auth-card {
      width: 100%;
      max-width: var(--page-max);
      background: var(--surface);
      border-radius: var(--r-2xl) var(--r-2xl) 0 0;
      padding: var(--sp-8) var(--sp-6) var(--sp-10);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-4);
      transform: translateY(100%);
      transition: transform var(--dur-med) var(--ease-out);
    }
    .biometric-auth-overlay.visible .biometric-auth-card {
      transform: translateY(0);
    }
    .biometric-auth-icon {
      width: 88px;
      height: 88px;
      border-radius: var(--r-full);
      background: var(--primary-xlight);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      position: relative;
    }
    /* Pulsing ring around fingerprint */
    .biometric-auth-icon::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: var(--r-full);
      border: 2px solid var(--primary);
      opacity: 0.4;
      animation: pulse-ring 1.5s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50%       { transform: scale(1.12); opacity: 0.15; }
    }
    .biometric-auth-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .biometric-auth-sub {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
    }
    .biometric-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .biometric-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--primary);
      animation: blink 1.2s ease-in-out infinite;
    }
    .biometric-dot:nth-child(2) { animation-delay: 0.2s; }
    .biometric-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
      40%           { opacity: 1;    transform: scale(1.2); }
    }
  </style>
</head>
<body>
<div class="phone-frame">
<div class="screen">

  <!-- Demo bar (above lock) -->
  <div class="demo-bar">
    <span class="demo-bar__label">State</span>
    <button class="demo-btn" data-state="locked">Lock</button>
    <button class="demo-btn" data-state="wrong-pin">Wrong PIN</button>
    <button class="demo-btn" data-state="biometric">Biometric</button>
  </div>

  <!-- Simulated blurred app background -->
  <div class="lock-bg"></div>

  <!-- Lock screen overlay -->
  <div class="lock-screen" id="lock-screen">

    <!-- Top: logo + greeting -->
    <div class="lock-top">
      <div class="lock-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <div class="lock-greeting">Welcome back, Vikas</div>
      <div class="lock-idle-text">Away for 8 minutes</div>
    </div>

    <!-- Middle: PIN entry -->
    <div class="lock-mid">
      <div class="lock-pin-label">Enter PIN</div>

      <div class="lock-pin-row" id="lock-pin-row">
        <input class="lock-pin-box" id="lpin-1" type="password" maxlength="1" inputmode="numeric">
        <input class="lock-pin-box" id="lpin-2" type="password" maxlength="1" inputmode="numeric">
        <input class="lock-pin-box" id="lpin-3" type="password" maxlength="1" inputmode="numeric">
        <input class="lock-pin-box" id="lpin-4" type="password" maxlength="1" inputmode="numeric">
        <input class="lock-pin-box" id="lpin-5" type="password" maxlength="1" inputmode="numeric">
        <input class="lock-pin-box" id="lpin-6" type="password" maxlength="1" inputmode="numeric">
      </div>

      <div class="lock-error-text" id="lock-error">
        That PIN didn't match. 2 attempts left.
      </div>

      <button class="lock-unlock-btn">Unlock</button>

      <button class="lock-biometric-btn" id="lock-biometric-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"/>
          <path d="M5 19.5C5.5 18 6 15 6 12c0-1.7.7-3.2 1.8-4.3"/>
          <path d="M17.5 21c-.5-2-.5-4.5.5-6.5 1-2 1-4.5-1-6.5"/>
          <path d="M22 12c0 1-.2 2-.5 3"/>
          <path d="M10.5 21c0-3.5 0-6 1.5-7.5"/>
          <path d="M14 11.5c1.5 1.5 1.5 4 1.5 7"/>
        </svg>
        Use Biometric
      </button>
    </div>

    <!-- Bottom: switch account -->
    <div class="lock-bottom">
      <button class="lock-switch-account">Sign in with different account</button>
    </div>

  </div>

  <!-- Biometric authenticating overlay -->
  <div class="biometric-auth-overlay" id="biometric-auth-overlay">
    <div class="biometric-auth-card">
      <div class="sheet__handle"></div>
      <div class="biometric-auth-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"/>
          <path d="M5 19.5C5.5 18 6 15 6 12c0-1.7.7-3.2 1.8-4.3"/>
          <path d="M17.5 21c-.5-2-.5-4.5.5-6.5 1-2 1-4.5-1-6.5"/>
          <path d="M22 12c0 1-.2 2-.5 3"/>
          <path d="M10.5 21c0-3.5 0-6 1.5-7.5"/>
          <path d="M14 11.5c1.5 1.5 1.5 4 1.5 7"/>
        </svg>
      </div>
      <div class="biometric-auth-title">Authenticating…</div>
      <div class="biometric-auth-sub">Touch the fingerprint sensor<br>on your device</div>
      <div class="biometric-dots">
        <div class="biometric-dot"></div>
        <div class="biometric-dot"></div>
        <div class="biometric-dot"></div>
      </div>
      <button class="btn btn--ghost" id="biometric-auth-cancel" style="margin-top:var(--sp-2); color:var(--text-secondary)">Cancel</button>
    </div>
  </div>

</div>
</div>
<script src="../assets/nav.js"></script>
<script>
  const lockPins    = document.querySelectorAll('.lock-pin-box');
  const lockError   = document.getElementById('lock-error');
  const bioAuthOverlay = document.getElementById('biometric-auth-overlay');
  const lockBioBtn  = document.getElementById('lock-biometric-btn');
  const bioCancel   = document.getElementById('biometric-auth-cancel');

  // Auto-advance PIN boxes
  lockPins.forEach((box, i) => {
    box.addEventListener('input', () => {
      box.value = box.value.replace(/\D/g, '').slice(-1);
      box.classList.toggle('filled', box.value.length > 0);
      if (box.value && lockPins[i + 1]) lockPins[i + 1].focus();
    });
    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !box.value && lockPins[i - 1]) {
        lockPins[i - 1].focus();
        lockPins[i - 1].value = '';
        lockPins[i - 1].classList.remove('filled');
      }
    });
  });

  // Biometric button
  lockBioBtn.addEventListener('click', () => {
    bioAuthOverlay.classList.add('visible');
  });
  bioCancel.addEventListener('click', () => {
    bioAuthOverlay.classList.remove('visible');
  });
  bioAuthOverlay.addEventListener('click', (e) => {
    if (e.target === bioAuthOverlay) bioAuthOverlay.classList.remove('visible');
  });

  function clearPinState() {
    lockPins.forEach(b => {
      b.value = '';
      b.classList.remove('filled', 'error');
    });
    lockError.classList.remove('visible');
    bioAuthOverlay.classList.remove('visible');
  }

  function setErrorState() {
    lockPins.forEach(b => {
      b.value = '•';
      b.classList.add('filled', 'error');
    });
    lockError.classList.add('visible');
    // Remove error class after animation
    setTimeout(() => {
      lockPins.forEach(b => b.classList.remove('error'));
    }, 500);
  }

  AG.initDemoBar({
    'locked': () => {
      clearPinState();
    },
    'wrong-pin': () => {
      bioAuthOverlay.classList.remove('visible');
      // Show filled boxes first, then apply error
      lockPins.forEach(b => {
        b.value = '•';
        b.classList.add('filled');
        b.classList.remove('error');
      });
      // Trigger shake after a brief moment
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          lockPins.forEach(b => {
            b.classList.add('error');
          });
          lockError.classList.add('visible');
          setTimeout(() => {
            lockPins.forEach(b => b.classList.remove('error'));
          }, 400);
        });
      });
    },
    'biometric': () => {
      clearPinState();
      setTimeout(() => bioAuthOverlay.classList.add('visible'), 200);
    },
  });
</script>
</body>
</html>
