<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArthaGrid — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    /* Auth screens are full-screen — no top bar, no bottom nav */
    .auth-screen {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    /* Decorative background orbs */
    .auth-screen::before {
      content: '';
      position: absolute;
      top: -120px;
      right: -80px;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(13,148,136,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-screen::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: -60px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(13,148,136,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .auth-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: var(--sp-8) var(--sp-6);
      position: relative;
      z-index: 1;
    }

    /* Brand mark */
    .auth-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-3);
      margin-bottom: var(--sp-10);
    }
    .auth-brand__logo {
      width: 64px;
      height: 64px;
      border-radius: var(--r-2xl);
      background: var(--grad-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      box-shadow: 0 8px 24px rgba(13,148,136,0.32);
      animation: card-in 0.4s var(--ease-spring) both;
    }
    .auth-brand__name {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
      animation: fade-in 0.4s var(--ease-out) 0.1s both;
    }
    .auth-brand__tagline {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      animation: fade-in 0.4s var(--ease-out) 0.2s both;
    }

    /* Form */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: card-in 0.4s var(--ease-out) 0.15s both;
    }

    /* Phone input with prefix */
    .phone-input-wrap {
      position: relative;
    }
    .phone-prefix {
      position: absolute;
      left: var(--sp-4);
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      pointer-events: none;
      z-index: 1;
    }
    .phone-input-wrap .form-input {
      padding-left: calc(var(--sp-4) + 38px);
    }

    /* Password input with toggle */
    .password-wrap {
      position: relative;
    }
    .password-wrap .form-input {
      padding-right: 48px;
    }
    .password-toggle {
      position: absolute;
      right: var(--sp-3);
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--r-md);
      transition: color var(--dur-fast), background var(--dur-fast);
      background: none;
      border: none;
    }
    .password-toggle:hover {
      color: var(--text-secondary);
      background: var(--surface-raised);
    }

    /* Forgot link */
    .forgot-link {
      text-align: right;
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      margin-top: var(--sp-2);
      cursor: pointer;
      text-decoration: none;
    }
    .forgot-link:hover { text-decoration: underline; }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin: var(--sp-5) 0;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-divider__text {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Biometric button */
    .biometric-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-2);
      width: 100%;
      height: 48px;
      border: 1.5px solid var(--border-strong);
      border-radius: var(--r-md);
      background: var(--surface);
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--dur-fast), border-color var(--dur-fast), box-shadow var(--dur-fast);
    }
    .biometric-btn:hover {
      background: var(--primary-xlight);
      border-color: var(--primary);
      color: var(--primary);
    }
    .biometric-btn:active {
      transform: scale(0.98);
    }

    /* Sign-up link */
    .auth-footer {
      text-align: center;
      margin-top: var(--sp-6);
      font-size: 13px;
      color: var(--text-secondary);
    }
    .auth-footer a {
      color: var(--primary);
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* Error message */
    .form-error-msg {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--error);
      background: var(--error-light);
      border: 1px solid rgba(233,69,96,0.20);
      border-radius: var(--r-md);
      padding: var(--sp-3) var(--sp-3);
      margin-top: var(--sp-2);
      animation: card-in var(--dur-base) var(--ease-out) both;
    }
    .form-error-msg.visible { display: flex; }

    /* Biometric overlay */
    .biometric-overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: var(--z-modal);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur-med) var(--ease-out);
    }
    .biometric-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .biometric-card {
      width: 100%;
      max-width: var(--page-max);
      background: var(--surface);
      border-radius: var(--r-2xl) var(--r-2xl) 0 0;
      padding: var(--sp-8) var(--sp-6) var(--sp-10);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-4);
      transform: translateY(100%);
      transition: transform var(--dur-med) var(--ease-out);
    }
    .biometric-overlay.visible .biometric-card {
      transform: translateY(0);
    }
    .biometric-icon {
      width: 80px;
      height: 80px;
      border-radius: var(--r-full);
      background: var(--primary-xlight);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      animation: float 2s ease-in-out infinite;
    }
    .biometric-card__title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .biometric-card__subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
    }
  </style>
</head>
<body>
<div class="phone-frame">
<div class="screen">

  <!-- Demo bar -->
  <div class="demo-bar">
    <span class="demo-bar__label">State</span>
    <button class="demo-btn" data-state="empty">Empty</button>
    <button class="demo-btn" data-state="filled">Filled</button>
    <button class="demo-btn" data-state="error">Error</button>
    <button class="demo-btn" data-state="biometric">Biometric</button>
  </div>

  <div class="auth-screen">
    <div class="auth-body">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="auth-brand__logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </div>
        <div class="auth-brand__name">ArthaGrid</div>
        <div class="auth-brand__tagline">Your financial operating system</div>
      </div>

      <!-- Form -->
      <div class="auth-form">
        <!-- Phone field -->
        <div class="form-group">
          <label class="form-label" for="phone-input">Mobile Number</label>
          <div class="phone-input-wrap">
            <span class="phone-prefix">+91</span>
            <input
              id="phone-input"
              class="form-input"
              type="tel"
              placeholder="98765 43210"
              inputmode="numeric"
              maxlength="15"
              autocomplete="tel"
            >
          </div>
        </div>

        <!-- Password field -->
        <div class="form-group">
          <label class="form-label" for="password-input">PIN / Password</label>
          <div class="password-wrap">
            <input
              id="password-input"
              class="form-input"
              type="password"
              placeholder="Enter your PIN"
              autocomplete="current-password"
            >
            <button class="password-toggle" id="pw-toggle" type="button" aria-label="Toggle password visibility">
              <!-- Eye icon -->
              <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (hidden by default) -->
              <svg id="eye-off-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
          <!-- Error message (hidden by default) -->
          <div class="form-error-msg" id="pw-error">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="pw-error-text">Incorrect password. 2 attempts remaining.</span>
          </div>
        </div>

        <!-- Forgot PIN link -->
        <a href="forgot.html" class="forgot-link">Forgot PIN?</a>

        <!-- Sign In button -->
        <button class="btn btn--primary btn--full btn--lg" style="margin-top: var(--sp-5)">
          Sign In
        </button>

        <!-- Divider -->
        <div class="auth-divider">
          <span class="auth-divider__text">or continue with</span>
        </div>

        <!-- Biometric button -->
        <button class="biometric-btn" id="biometric-btn" type="button">
          <!-- Fingerprint SVG -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"/>
            <path d="M5 19.5C5.5 18 6 15 6 12c0-1.7.7-3.2 1.8-4.3"/>
            <path d="M17.5 21c-.5-2-.5-4.5.5-6.5 1-2 1-4.5-1-6.5"/>
            <path d="M22 12c0 1-.2 2-.5 3"/>
            <path d="M10.5 21c0-3.5 0-6 1.5-7.5"/>
            <path d="M14 11.5c1.5 1.5 1.5 4 1.5 7"/>
          </svg>
          Use Biometric
        </button>

        <!-- Sign up link -->
        <div class="auth-footer">
          First time? <a href="../setup-wizard/welcome.html">Set up ArthaGrid</a>
        </div>
      </div>

    </div>
  </div>

  <!-- Biometric Overlay -->
  <div class="biometric-overlay" id="biometric-overlay">
    <div class="biometric-card">
      <div class="sheet__handle"></div>
      <div class="biometric-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12C2 6.5 6.5 2 12 2a10 10 0 0 1 8 4"/>
          <path d="M5 19.5C5.5 18 6 15 6 12c0-1.7.7-3.2 1.8-4.3"/>
          <path d="M17.5 21c-.5-2-.5-4.5.5-6.5 1-2 1-4.5-1-6.5"/>
          <path d="M22 12c0 1-.2 2-.5 3"/>
          <path d="M10.5 21c0-3.5 0-6 1.5-7.5"/>
          <path d="M14 11.5c1.5 1.5 1.5 4 1.5 7"/>
        </svg>
      </div>
      <div class="biometric-card__title">Biometric Login</div>
      <div class="biometric-card__subtitle">Touch sensor to authenticate<br>as Vikas Sharma</div>
      <button class="btn btn--ghost btn--full" id="biometric-cancel" style="margin-top:var(--sp-2)">Cancel</button>
    </div>
  </div>

</div>
</div>
<script src="../assets/nav.js"></script>
<script>
  const phoneInput    = document.getElementById('phone-input');
  const passwordInput = document.getElementById('password-input');
  const pwError       = document.getElementById('pw-error');
  const pwToggle      = document.getElementById('pw-toggle');
  const eyeIcon       = document.getElementById('eye-icon');
  const eyeOffIcon    = document.getElementById('eye-off-icon');
  const biometricOverlay = document.getElementById('biometric-overlay');
  const biometricBtn  = document.getElementById('biometric-btn');
  const biometricCancel = document.getElementById('biometric-cancel');

  // Password show/hide toggle
  pwToggle.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    eyeIcon.style.display    = isHidden ? 'none' : 'block';
    eyeOffIcon.style.display = isHidden ? 'block' : 'none';
  });

  // Biometric button opens overlay
  biometricBtn.addEventListener('click', () => {
    biometricOverlay.classList.add('visible');
  });
  biometricCancel.addEventListener('click', () => {
    biometricOverlay.classList.remove('visible');
  });
  biometricOverlay.addEventListener('click', (e) => {
    if (e.target === biometricOverlay) biometricOverlay.classList.remove('visible');
  });

  function clearErrors() {
    passwordInput.classList.remove('form-input--error');
    pwError.classList.remove('visible');
  }

  function setError(msg) {
    passwordInput.classList.add('form-input--error');
    pwError.classList.add('visible');
    document.getElementById('pw-error-text').textContent = msg;
  }

  function setFilled() {
    phoneInput.value    = '98765 43210';
    passwordInput.value = '123456';
    passwordInput.type  = 'password';
    eyeIcon.style.display    = 'block';
    eyeOffIcon.style.display = 'none';
    clearErrors();
  }

  AG.initDemoBar({
    'empty': () => {
      phoneInput.value    = '';
      passwordInput.value = '';
      clearErrors();
      biometricOverlay.classList.remove('visible');
    },
    'filled': () => {
      setFilled();
      biometricOverlay.classList.remove('visible');
    },
    'error': () => {
      phoneInput.value    = '98765 43210';
      passwordInput.value = '000000';
      biometricOverlay.classList.remove('visible');
      setError('Incorrect password. 2 attempts remaining.');
    },
    'biometric': () => {
      setFilled();
      setTimeout(() => biometricOverlay.classList.add('visible'), 150);
    },
  });
</script>
</body>
</html>
