<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ArthaGrid — Nomination Matrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/style.css">
  <style>
    /* ── Coverage hero ── */
    .coverage-hero__pct {
      font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
      font-size: 40px; font-weight: 700; line-height: 1.1;
    }
    .coverage-hero__sub { font-size: 13px; color: var(--text-secondary); margin-top: var(--sp-2); }

    /* ── Asset row ── */
    .asset-row {
      display: flex; align-items: center; gap: var(--sp-3);
      padding: var(--sp-4); background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-lg); margin-bottom: var(--sp-2);
      animation: item-in var(--dur-med) var(--ease-out) both;
    }
    .asset-row--gap { border-color: rgba(233,69,96,.3); background: rgba(233,69,96,.03); }
    .asset-row__icon {
      width: 40px; height: 40px; border-radius: var(--r-md); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 19px;
    }
    .asset-row__info { flex: 1; min-width: 0; }
    .asset-row__name {
      font-size: 14px; font-weight: 600; color: var(--text-primary);
      display: flex; align-items: center; gap: var(--sp-2); flex-wrap: wrap;
    }
    .asset-row__meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .asset-row__nominee { font-size: 12px; font-weight: 600; margin-top: 3px; }
    .asset-row__nominee--yes { color: var(--success); }
    .asset-row__nominee--no { color: var(--error); }

    .module-label {
      font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      color: var(--text-muted); background: var(--surface-raised); border: 1px solid var(--border);
      padding: 1px 7px; border-radius: var(--r-full); flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="phone-frame">
<div class="screen">

  <!-- ═══════════════════════════════════════════
       DEMO BAR
  ═══════════════════════════════════════════ -->
  <div class="demo-bar">
    <span class="demo-bar__label">View</span>
    <button class="demo-btn active" data-state="all">All Assets</button>
    <button class="demo-btn" data-state="gaps">Missing Nominee Only</button>
    <button class="icon-btn" id="theme-toggle" style="margin-left:auto;" aria-label="Toggle theme">
      <span id="theme-icon" style="font-size:18px;">🌙</span>
    </button>
  </div>

  <!-- ═══════════════════════════════════════════
       TOP BAR
  ═══════════════════════════════════════════ -->
  <div class="top-bar">
    <a href="estate-map.html" class="top-bar__back" aria-label="Back">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </a>
    <span class="top-bar__title">Nomination Matrix</span>
    <div class="top-bar__actions" style="gap:4px;">
      <button class="icon-btn" data-theme-toggle aria-label="Toggle theme">
        <span data-theme-icon style="font-size:18px;">🌙</span>
      </button>
      <div class="avatar">VS</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       PAGE CONTENT
  ═══════════════════════════════════════════ -->
  <div class="page-content" id="page-content">

    <!-- Coverage Hero -->
    <div class="glass-card glass-card--hero">
      <div class="card-header" style="margin-bottom:var(--sp-2);">
        <div class="card-icon card-icon--warning" style="font-size:18px;">🗂️</div>
        <div class="card-title">Nominee Coverage</div>
      </div>
      <div class="coverage-hero__pct gradient-text">78%</div>
      <div class="coverage-hero__sub">7 of 9 assets have nominees — 78% coverage</div>
      <div class="progress-bar progress-bar--thick" style="margin-top:var(--sp-3);">
        <div class="progress-bar__fill progress-bar__fill--warning" style="width:78%;"></div>
      </div>
    </div>

    <div class="section-title" style="margin-top:var(--sp-6);">Assets</div>
    <div id="asset-list"><!-- rendered by JS --></div>

    <a href="estate-map.html" class="compare-link-card" style="display:flex; align-items:center; gap:var(--sp-3); background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:var(--sp-4); margin-top:var(--sp-5); text-decoration:none;">
      <div style="width:40px; height:40px; border-radius:var(--r-lg); flex-shrink:0; background:var(--grad-primary); color:#fff; display:flex; align-items:center; justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div style="flex:1; min-width:0;">
        <div style="font-size:14px; font-weight:600; color:var(--text-primary);">Estate Readiness &amp; Document Map</div>
        <div style="font-size:12px; color:var(--text-muted); margin-top:1px;">Will, executor, document locations</div>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted); flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>
    </a>

  </div><!-- /page-content -->

  <!-- ═══════════════════════════════════════════
       BOTTOM NAV
  ═══════════════════════════════════════════ -->
  <nav class="bottom-nav">
    <a href="../dashboard/index.html" class="nav-tab" data-tab="dashboard">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Dashboard</span>
    </a>
    <a href="../budget/index.html" class="nav-tab" data-tab="budget">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 7V5a2 2 0 0 0-4 0v2"/>
      </svg>
      <span>Budget</span>
    </a>
    <a href="../transactions/index.html" class="nav-tab" data-tab="txn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span>Transactions</span>
    </a>
    <a href="../investments/index.html" class="nav-tab" data-tab="invest">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span>Invest</span>
    </a>
    <a href="../settings/index.html" class="nav-tab" data-tab="profile">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profile</span>
    </a>
  </nav>

</div><!-- /screen -->
</div><!-- /phone-frame -->

<script src="../assets/nav.js"></script>
<script>
  /* ── Theme toggle (matches other pages) ── */
  const stored = localStorage.getItem('ag-theme');
  if (stored) document.documentElement.setAttribute('data-theme', stored);
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('ag-theme', next);
    document.getElementById('theme-icon').textContent = next === 'dark' ? '☀️' : '🌙';
  });
  document.querySelectorAll('[data-theme-toggle]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cur = document.documentElement.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('ag-theme', next);
      document.querySelectorAll('[data-theme-icon]').forEach(el => { el.textContent = next === 'dark' ? '☀️' : '🌙'; });
    });
  });

  /* ── Vikas Sharma's assets across modules ── */
  const ASSETS = [
    { name: 'HDFC Bank Savings', meta: '•••• 4821 · Bank Accounts', module: 'BANK', icon: '🏦', iconBg: '#DBEAFE', nominee: 'Priya Sharma (Spouse)' },
    { name: 'ICICI Bank Savings', meta: '•••• 7756 · Bank Accounts', module: 'BANK', icon: '🏦', iconBg: '#FFEDD5', nominee: null },
    { name: 'SBI Fixed Deposit', meta: '•••• 3390 · Matures 1 Oct 2027', module: 'FD/RD', icon: '🔒', iconBg: '#DBEAFE', nominee: 'Priya Sharma (Spouse)' },
    { name: 'India Post RD', meta: '•••• 9012 · Matures 1 Jan 2030', module: 'FD/RD', icon: '🔒', iconBg: '#D1FAE5', nominee: 'Sunita Sharma (Mother)' },
    { name: 'Mutual Fund Portfolio', meta: 'Axis Bluechip + Parag Parikh Flexi Cap', module: 'MF', icon: '📈', iconBg: '#F0FDFA', nominee: 'Priya Sharma (Spouse)' },
    { name: 'Employees\' Provident Fund', meta: 'EPF · via HDFC Bank employer · ₹1,80,000', module: 'EPF', icon: '💼', iconBg: '#FEF9C3', nominee: 'Priya Sharma (Spouse)' },
    { name: 'Public Provident Fund', meta: 'PPF · SBI · ₹2,20,000', module: 'PPF', icon: '💰', iconBg: '#FEF3C7', nominee: null },
    { name: 'NPS Corpus', meta: 'Tier 1 + Tier 2 · ₹1,80,000', module: 'NPS', icon: '🏛️', iconBg: '#EDE9FE', nominee: 'Priya Sharma (Spouse)' },
    { name: 'HDFC Life Click 2 Protect Super', meta: 'Term Life · ₹1,00,00,000 sum assured', module: 'INSURANCE', icon: '🛡️', iconBg: '#FEE2E2', nominee: 'Priya Sharma (Spouse) · Aarav Sharma (contingent)' },
  ];

  function assetRowHtml(a) {
    const has = !!a.nominee;
    return `
      <div class="asset-row ${has ? '' : 'asset-row--gap'}">
        <div class="asset-row__icon" style="background:${a.iconBg};">${a.icon}</div>
        <div class="asset-row__info">
          <div class="asset-row__name">
            ${a.name}
            <span class="module-label">${a.module}</span>
            ${has ? '' : '<span class="chip chip--critical">⚠ No Nominee</span>'}
          </div>
          <div class="asset-row__meta">${a.meta}</div>
          <div class="asset-row__nominee ${has ? 'asset-row__nominee--yes' : 'asset-row__nominee--no'}">
            ${has ? '✓ Nominee: ' + a.nominee : '✕ No nominee on record'}
          </div>
        </div>
      </div>`;
  }

  function render(filter) {
    const list = filter === 'gaps' ? ASSETS.filter(a => !a.nominee) : ASSETS;
    document.getElementById('asset-list').innerHTML = list.map(assetRowHtml).join('');
  }

  /* ── Demo bar: All Assets / Missing Nominee Only ── */
  AG.initDemoBar({
    all: () => render('all'),
    gaps: () => render('gaps'),
  });
</script>
</body>
</html>
